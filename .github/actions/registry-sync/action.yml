# =============================================================================
# Composite Action: Registry Sync
# Path: .github/actions/registry-sync/action.yml
# =============================================================================
# Reusable action for syncing images between Docker Hub and GHCR.
# Uses skopeo for manifest-preserving multi-arch copies.
#
# Sync logic:
#   • Tag in DH only  → copy DH → GHCR
#   • Tag in GHCR only → copy GHCR → DH
#   • Tag in both     → skip (already in sync)
#   • Tag in neither  → skip (not yet built)
#
# Usage:
#   - name: Sync images
#     uses: ./.github/actions/registry-sync
#     with:
#       dockerhub_repo: myuser/db-mcp-server
#       ghcr_repo:      ghcr.io/myuser/db-mcp-server
#       tags:           latest,stable,1.8.0
#
# Prerequisites:
#   • skopeo must be installed on the runner
#   • Both registries must already be logged in (use registry-login action first)
# =============================================================================

name: 'Registry Sync'
description: 'Bidirectional sync of Docker images between Docker Hub and GHCR using skopeo'

inputs:
  dockerhub_repo:
    description: 'Docker Hub repository (e.g., username/image — no tag)'
    required: true
  ghcr_repo:
    description: 'GHCR repository (e.g., ghcr.io/owner/image — no tag)'
    required: true
  tags:
    description: 'Comma-separated list of tags to sync (e.g., latest,stable,1.8.0)'
    required: true
  concurrency:
    description: 'Number of tags to sync in parallel (default: 3)'
    required: false
    default: '3'
  retry_count:
    description: 'Number of skopeo copy retries on transient failures (default: 3)'
    required: false
    default: '3'

outputs:
  synced_tags:
    description: 'Space-separated list of tags that were actually synced'
    value: ${{ steps.sync.outputs.synced_tags }}
  skipped_tags:
    description: 'Space-separated list of tags skipped (already in both registries)'
    value: ${{ steps.sync.outputs.skipped_tags }}
  failed_tags:
    description: 'Space-separated list of tags that failed to sync'
    value: ${{ steps.sync.outputs.failed_tags }}

runs:
  using: 'composite'
  steps:
    - name: Sync images between registries
      id: sync
      shell: bash
      env:
        DOCKERHUB_REPO: ${{ inputs.dockerhub_repo }}
        GHCR_REPO:      ${{ inputs.ghcr_repo }}
        TAGS:           ${{ inputs.tags }}
        RETRY_COUNT:    ${{ inputs.retry_count }}
      run: |
        SYNCED_TAGS=""
        SKIPPED_TAGS=""
        FAILED_TAGS=""

        # ── skopeo_copy_with_retry tag src dst ─────────────────────────────
        # Copies a multi-arch image (--all) with progressive-backoff retries.
        skopeo_copy_with_retry() {
          local description="$1"
          local src="$2"
          local dst="$3"
          local max=${RETRY_COUNT:-3}
          local attempt=1

          while [[ $attempt -le $max ]]; do
            echo "  [attempt $attempt/$max] $description"
            if skopeo copy --all "docker://${src}" "docker://${dst}"; then
              echo "  ✅ Success"
              return 0
            fi
            local wait=$(( attempt * 15 ))
            echo "  ⚠️  Failed — retrying in ${wait}s..."
            sleep "$wait"
            (( attempt++ ))
          done

          echo "  ❌ All $max attempts failed: $description"
          return 1
        }

        # ── sync_tag tag ───────────────────────────────────────────────────
        sync_tag() {
          local tag="$1"
          local dh_ref="${DOCKERHUB_REPO}:${tag}"
          local gc_ref="${GHCR_REPO}:${tag}"

          echo "── Tag: $tag ──────────────────────────────────"

          local DH_EXISTS GC_EXISTS
          DH_EXISTS=$(skopeo inspect "docker://${dh_ref}" &>/dev/null && echo yes || echo no)
          GC_EXISTS=$(skopeo inspect "docker://${gc_ref}" &>/dev/null && echo yes || echo no)
          echo "  Docker Hub: $DH_EXISTS | GHCR: $GC_EXISTS"

          if [[ "$DH_EXISTS" == yes && "$GC_EXISTS" == no ]]; then
            echo "  → Syncing Docker Hub → GHCR"
            if skopeo_copy_with_retry "$tag: DH→GHCR" "$dh_ref" "$gc_ref"; then
              SYNCED_TAGS="$SYNCED_TAGS $tag(DH→GHCR)"
            else
              FAILED_TAGS="$FAILED_TAGS $tag"
            fi

          elif [[ "$DH_EXISTS" == no && "$GC_EXISTS" == yes ]]; then
            echo "  → Syncing GHCR → Docker Hub"
            if skopeo_copy_with_retry "$tag: GHCR→DH" "$gc_ref" "$dh_ref"; then
              SYNCED_TAGS="$SYNCED_TAGS $tag(GHCR→DH)"
            else
              FAILED_TAGS="$FAILED_TAGS $tag"
            fi

          elif [[ "$DH_EXISTS" == yes && "$GC_EXISTS" == yes ]]; then
            # Both present — check if digests match; re-sync if they diverged
            DH_DIG=$(skopeo inspect --raw "docker://${dh_ref}" 2>/dev/null | sha256sum | cut -d' ' -f1 || echo "")
            GC_DIG=$(skopeo inspect --raw "docker://${gc_ref}" 2>/dev/null | sha256sum | cut -d' ' -f1 || echo "")

            if [[ -n "$DH_DIG" && -n "$GC_DIG" && "$DH_DIG" != "$GC_DIG" ]]; then
              echo "  → Digest mismatch — re-syncing Docker Hub → GHCR"
              if skopeo_copy_with_retry "$tag: DH→GHCR (re-sync)" "$dh_ref" "$gc_ref"; then
                SYNCED_TAGS="$SYNCED_TAGS $tag(re-sync)"
              else
                FAILED_TAGS="$FAILED_TAGS $tag"
              fi
            else
              echo "  ✅ Already in sync — skipping"
              SKIPPED_TAGS="$SKIPPED_TAGS $tag"
            fi

          else
            echo "  ⚠️  Not found in either registry — skipping"
            SKIPPED_TAGS="$SKIPPED_TAGS $tag(not-found)"
          fi
        }

        # ── Process tags sequentially (parallel support via xargs if needed) ─
        IFS=',' read -ra TAG_ARRAY <<< "$TAGS"
        for tag in "${TAG_ARRAY[@]}"; do
          tag=$(echo "$tag" | xargs)   # trim whitespace
          [[ -z "$tag" ]] && continue
          sync_tag "$tag"
        done

        # ── Outputs ────────────────────────────────────────────────────────
        echo "synced_tags=${SYNCED_TAGS# }"  >> "$GITHUB_OUTPUT"
        echo "skipped_tags=${SKIPPED_TAGS# }" >> "$GITHUB_OUTPUT"
        echo "failed_tags=${FAILED_TAGS# }"   >> "$GITHUB_OUTPUT"

        echo ""
        echo "=== Sync Summary ==="
        echo "Synced:  ${SYNCED_TAGS:-none}"
        echo "Skipped: ${SKIPPED_TAGS:-none}"
        echo "Failed:  ${FAILED_TAGS:-none}"

        # Fail the step if any tag failed
        [[ -n "${FAILED_TAGS// }" ]] && exit 1 || exit 0

    - name: Write sync summary
      if: always()
      shell: bash
      run: |
        {
          echo "## 🔄 Registry Sync: ${{ inputs.dockerhub_repo }}"
          echo "| Tag(s) | Status |"
          echo "|---|---|"
          for t in ${{ steps.sync.outputs.synced_tags }};  do echo "| $t | ✅ Synced |";  done
          for t in ${{ steps.sync.outputs.skipped_tags }}; do echo "| $t | ⏭️ Skipped |"; done
          for t in ${{ steps.sync.outputs.failed_tags }};  do echo "| $t | ❌ Failed |";  done
        } >> "$GITHUB_STEP_SUMMARY"
