# =============================================================================
# Composite Action: Registry Login
# Path: .github/actions/registry-login/action.yml
# =============================================================================
# Reusable action to login to Docker Hub and GitHub Container Registry.
# Reduces code duplication across workflow jobs.
#
# Usage:
#   - name: Login to registries
#     uses: ./.github/actions/registry-login
#     with:
#       dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
#       dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
#       ghcr_actor:         ${{ github.actor }}
#       ghcr_token:         ${{ secrets.GITHUB_TOKEN }}
#       # Optional — disable individual registries:
#       push_to_dockerhub: 'false'
#       push_to_ghcr:      'false'
# =============================================================================

name: 'Registry Login'
description: 'Login to Docker Hub and GitHub Container Registry'

inputs:
  dockerhub_username:
    description: 'Docker Hub username'
    required: true
  dockerhub_token:
    description: 'Docker Hub access token'
    required: true
  ghcr_actor:
    description: 'GitHub actor for GHCR login (pass github.actor)'
    required: true
  ghcr_token:
    description: 'GitHub token for GHCR login (pass secrets.GITHUB_TOKEN)'
    required: true
  push_to_dockerhub:
    description: 'Enable Docker Hub login (set false to skip)'
    required: false
    default: 'true'
  push_to_ghcr:
    description: 'Enable GHCR login (set false to skip)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Login to Docker Hub
      if: inputs.push_to_dockerhub != 'false'
      uses: docker/login-action@v4
      with:
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_token }}

    - name: Login to GitHub Container Registry
      if: inputs.push_to_ghcr != 'false'
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ inputs.ghcr_actor }}
        password: ${{ inputs.ghcr_token }}
