# .github/workflows/docker-publish.yml
# =============================================================================
# db-mcp-server — Docker Build & Publish
# =============================================================================
#
# Merged feature set from:
#   • ispyagentdvr docker-build.yml   (scheduling, promotion, sync, scan)
#   • ispyagentdvr-docker.sh          (BuildKit tuning, compression profiles)
#   • registry-login / registry-sync  (composite actions)
#
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
#   workflow_dispatch → manual with full action + profile selection
#
# Required Secrets  (Settings → Secrets → Actions)
# ─────────────────────────────────────────────────────────────────────────────
#   DOCKERHUB_USERNAME    Docker Hub username
#   DOCKERHUB_TOKEN       Docker Hub access token (not your password)
#   GITHUB_TOKEN          Provided automatically (packages:write scope)
#   GHCR_TOKEN            Optional PAT fallback for GHCR write operations
#
# Repository Variables  (Settings → Secrets and variables → Variables)
# ─────────────────────────────────────────────────────────────────────────────
#   TZ                    Timezone for date tags          (default: Asia/Dhaka)
#   DOCKERHUB_REPO        Full DH repo name               (default: below)
#   GHCR_REPO             Full GHCR repo name             (default: below)
#   DEFAULT_PLATFORMS     Comma-separated platform list   (default: below)
#   UPDATE_BASE_IMAGE_ENABLED  'true' to auto-rebuild on base changes
# =============================================================================

name: Docker Build & Publish

on:
  # ── External dispatch (cron-job.org / scheduler) ────────────────────────────
  # Mirrors the workflow_dispatch inputs as client_payload fields so a
  # fine-grained PAT with only Contents: read/write can fire the workflow
  # via POST /repos/{o}/{r}/dispatches (workflow_dispatch needs Actions:
  # write). Trigger types are namespaced so different schedulers can target
  # specific actions without colliding.
  repository_dispatch:
    types:
      - auto-check
      - build-versions
      - promote-image
      - sync-registries
      - mark-stable
  # ── Manual dispatch ─────────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - auto-check
          - build-versions
          - promote-image
          - sync-registries
          - mark-stable
        default: auto-check

      build_profile:
        description: 'Build profile (controls compression + resource limits)'
        required: false
        type: choice
        options:
          - production
          - ci
          - development
          - size-optimized
        default: production

      versions:
        description: |
          Versions to build (build-versions only)
          Single: 1.8.0 | Multiple: 1.7.0,1.8.0 | Range: 1.7.0-1.8.0
        required: false
        type: string
        default: ''

      promote_version:
        description: 'Source version to promote (promote-image only)'
        required: false
        type: string
        default: ''

      promote_tag:
        description: 'Target promotion tag'
        required: false
        type: choice
        options:
          - latest
          - stable
        default: latest

      force_build:
        description: |
          Force rebuild even if image exists in one or both registries.
          In auto-check: when upstream HEAD coincides with a release tag
          (upstream git tag OR already-published :X.Y.Z in GHCR),
          setting this redirects the run to rebuild that :X.Y.Z instead
          of skipping. No effect when HEAD is not a release commit.
        required: false
        type: boolean
        default: false

      force_nightly:
        description: |
          Rebuild :nightly even when HEAD is already published as :nightly
          (bypass of the :nightly label-match check only). Does NOT
          bypass the release checks — if HEAD is a release commit, a
          nightly build is always refused regardless of this flag.
          Use force_build instead to rebuild a release image.
        required: false
        type: boolean
        default: false

      force_release_tag:
        description: |
          Force rebuild of a single release version (e.g. "1.8.0"), even if
          already present in GHCR. Leave blank for no force. Intentionally
          single-value — to rebuild multiple, use the build-versions action.
        required: false
        type: string
        default: ''

      nightly_sha_override:
        description: |
          Build this specific upstream commit SHA as :nightly instead of
          current HEAD. Useful for testing a pre-release commit before it
          reaches default branch. Leave blank to use HEAD.
        required: false
        type: string
        default: ''

      skip_existing:
        description: 'Skip versions already present in both registries'
        required: false
        type: boolean
        default: true

      run_security_scan:
        description: 'Run Trivy vulnerability scan (non-blocking)'
        required: false
        type: boolean
        default: true

      push_to_dockerhub:
        description: 'Push to Docker Hub'
        required: false
        type: boolean
        default: true

      push_to_ghcr:
        description: 'Push to GitHub Container Registry'
        required: false
        type: boolean
        default: true

      update_base_image:
        description: 'Rebuild if base image digest has changed'
        required: false
        type: boolean
        default: false

      platforms:
        description: 'Target platforms'
        required: false
        type: choice
        options:
          - 'linux/amd64,linux/arm64,linux/arm/v7'
          - 'linux/amd64,linux/arm64'
          - 'linux/amd64'
        default: 'linux/amd64,linux/arm64,linux/arm/v7'

      compression_level:
        description: 'Compression level (zstd: 1–22, gzip: 1–9). Default: 22'
        required: false
        type: string
        default: '22'

      custom_tag:
        description: |
          Custom image tag — replaces the auto-generated YYYYMMDD-<sha> tag.
          Example: 1.8.0-beta, v2.0.0, hotfix-xyz
          Leave blank to use the auto-generated tag.
        required: false
        type: string
        default: ''

      tag_as_latest:
        description: 'Also push as :latest tag'
        required: false
        type: boolean
        default: true

# ── Default permissions for all jobs ─────────────────────────────────────────
# actions: read  — required to download third-party actions (setup-qemu etc.)
# contents: read — required to checkout code
# packages: write — overridden per-job where needed
permissions:
  contents: write
  actions: read
  packages: read

# Serialize by action type so a running auto-check holds the lane against any
# other auto-check or build-versions run, preventing two concurrent builds of
# the same :X.Y.Z tag from racing on the final imagetools-create push.
# Per-matrix-entry concurrency is still scoped by (version, platform_slug) in
# the build-platform job, so distinct versions within one run parallelize.
concurrency:
  group: docker-build-${{ github.event.inputs.action || github.event.client_payload.action || github.event.action || 'auto-check' }}
  cancel-in-progress: false

env:
  # ── Input normalization (workflow_dispatch + repository_dispatch) ──────────
  # repository_dispatch carries fields under github.event.client_payload.*
  # while workflow_dispatch uses github.event.inputs.* — fall through both
  # so downstream steps can read a single env.IN_* name regardless of how
  # the run was triggered. Defaults mirror the workflow_dispatch input
  # defaults exactly.
  IN_ACTION:               ${{ github.event.inputs.action               || github.event.client_payload.action               || github.event.action || 'auto-check' }}
  IN_BUILD_PROFILE:        ${{ github.event.inputs.build_profile        || github.event.client_payload.build_profile        || 'production' }}
  IN_VERSIONS:             ${{ github.event.inputs.versions             || github.event.client_payload.versions             || '' }}
  IN_PROMOTE_VERSION:      ${{ github.event.inputs.promote_version      || github.event.client_payload.promote_version      || '' }}
  IN_PROMOTE_TAG:          ${{ github.event.inputs.promote_tag          || github.event.client_payload.promote_tag          || 'latest' }}
  IN_FORCE_BUILD:          ${{ github.event.inputs.force_build          || github.event.client_payload.force_build          || 'false' }}
  IN_FORCE_NIGHTLY:        ${{ github.event.inputs.force_nightly        || github.event.client_payload.force_nightly        || 'false' }}
  IN_FORCE_RELEASE_TAG:    ${{ github.event.inputs.force_release_tag    || github.event.client_payload.force_release_tag    || '' }}
  IN_NIGHTLY_SHA_OVERRIDE: ${{ github.event.inputs.nightly_sha_override || github.event.client_payload.nightly_sha_override || '' }}
  IN_SKIP_EXISTING:        ${{ github.event.inputs.skip_existing        || github.event.client_payload.skip_existing        || 'true' }}
  IN_RUN_SECURITY_SCAN:    ${{ github.event.inputs.run_security_scan    || github.event.client_payload.run_security_scan    || 'true' }}
  IN_PUSH_TO_DOCKERHUB:    ${{ github.event.inputs.push_to_dockerhub    || github.event.client_payload.push_to_dockerhub    || 'true' }}
  IN_PUSH_TO_GHCR:         ${{ github.event.inputs.push_to_ghcr         || github.event.client_payload.push_to_ghcr         || 'true' }}
  IN_UPDATE_BASE_IMAGE:    ${{ github.event.inputs.update_base_image    || github.event.client_payload.update_base_image    || 'false' }}
  IN_PLATFORMS:            ${{ github.event.inputs.platforms            || github.event.client_payload.platforms            || 'linux/amd64,linux/arm64,linux/arm/v7' }}
  IN_COMPRESSION_LEVEL:    ${{ github.event.inputs.compression_level    || github.event.client_payload.compression_level    || '22' }}
  IN_CUSTOM_TAG:           ${{ github.event.inputs.custom_tag           || github.event.client_payload.custom_tag           || '' }}
  IN_TAG_AS_LATEST:        ${{ github.event.inputs.tag_as_latest        || github.event.client_payload.tag_as_latest        || 'true' }}

  TZ:               ${{ vars.TZ               || 'Asia/Dhaka' }}
  DOCKERHUB_REPO:   ${{ vars.DOCKERHUB_REPO   || 'your-dockerhub-user/db-mcp-server' }}
  GHCR_REPO:        ${{ vars.GHCR_REPO        || 'ghcr.io/your-github-user/db-mcp-server' }}
  DEFAULT_PLATFORMS: ${{ vars.DEFAULT_PLATFORMS || 'linux/amd64,linux/arm64,linux/arm/v7' }}
  UPDATE_BASE_IMAGE_ENABLED: ${{ vars.UPDATE_BASE_IMAGE_ENABLED || 'false' }}
  # Comma-separated list of versions to exclude from builds (e.g. "1.7.0,1.8.0")
  EXCLUDE_VERSIONS: ${{ vars.EXCLUDE_VERSIONS || '' }}
  HAPROXY_IMAGE: ${{ vars.HAPROXY_IMAGE || 'haproxy:lts-alpine' }}
  # Base images (GHCR mirrors preferred to avoid Docker Hub rate limits).
  # Each is crane-probed at build time; if unreachable, the Docker Hub
  # short-name is used as fallback.
  BASE_IMAGE_BUILDER: ${{ vars.BASE_IMAGE_BUILDER || 'golang:alpine' }}
  BASE_IMAGE_RUNTIME: ${{ vars.BASE_IMAGE_RUNTIME || 'alpine:latest' }}
  XX_IMAGE:           ${{ vars.XX_IMAGE           || 'tonistiigi/xx:master' }}

  # ── Upstream source tracking ──────────────────────────────────────────────
  # Renovate watches this SHA and opens a PR when FreePeak/db-mcp-server
  # receives a new commit on main. Merging the PR triggers a new build.
  # renovate: datasource=git-refs depName=FreePeak/db-mcp-server packageName=https://github.com/FreePeak/db-mcp-server
  UPSTREAM_REPO_SHA: 19b7975d0ea203ea3be5cbda9b5e22997c0d92b5

  # ── BuildKit performance knobs (from ispyagentdvr-docker.sh) ─────────────
  BUILDKIT_STEP_LOG_MAX_SIZE:   "50000000"    # 50 MB log buffer
  BUILDKIT_STEP_LOG_MAX_SPEED:  "100000000"   # 100 MB/s max log speed
  BUILDKIT_PROGRESS:            plain
  DOCKER_BUILDKIT_INLINE_CACHE: "1"
  BUILDKIT_INLINE_CACHE:        "1"
  BUILDKIT_MULTI_PLATFORM:      "1"
  BUILDKIT_HTTP_TIMEOUT:        "300"
  BUILDKIT_REGISTRY_RETRY_COUNT: "3"
  BUILDKIT_GC_KEEP_DURATION:    "168h"        # 7 days

  # ── Export concurrency ────────────────────────────────────────────────────
  EXPORT_CACHE_CONCURRENCY:  "4"
  EXPORT_LAYERS_CONCURRENCY: "4"

jobs:
  # ============================================================================
  # Job 0 — Resolve build profile
  # Mirrors apply_build_profile() + build-compression-params() from .sh script.
  # (Old quick-check gate removed — check-releases now handles all skip logic
  # via discover-releases / resolve-nightly / determine-versions. Pipeline-
  # state SHA comparison was unsafe for nightly path.)
  # ============================================================================
  resolve-profile:
    name: Resolve build profile
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    outputs:
      compression_type:    ${{ steps.profile.outputs.compression_type }}
      compression_level:   ${{ steps.profile.outputs.compression_level }}
      compression_params:  ${{ steps.profile.outputs.compression_params }}
      gc_keep_storage:     ${{ steps.profile.outputs.gc_keep_storage }}
      build_retry_count:   ${{ steps.profile.outputs.build_retry_count }}
      build_timeout_min:   ${{ steps.profile.outputs.build_timeout_min }}
      resource_limit_pct:  ${{ steps.profile.outputs.resource_limit_pct }}

    steps:
      - name: Apply build profile
        id: profile
        run: |
          # workflow_dispatch may supply both profile and compression_level overrides
          PROFILE="${{ env.IN_BUILD_PROFILE || 'production' }}"
          LEVEL_OVERRIDE="${{ env.IN_COMPRESSION_LEVEL }}"

          case "$PROFILE" in
            development|dev)
              CT=gzip;  CL=1;  GC=5GB;  RC=1; TO=60;  RL=50 ;;
            ci|continuous-integration)
              CT=zstd;  CL=3;  GC=8GB;  RC=2; TO=60;  RL=75 ;;
            size-optimized)
              CT=gzip;  CL=9;  GC=20GB; RC=3; TO=120; RL=90 ;;
            production|prod|*)
              CT=zstd;  CL=22; GC=15GB; RC=3; TO=120; RL=95 ;;
          esac

          # Manual level override takes precedence (workflow_dispatch compression_level input)
          [[ -n "$LEVEL_OVERRIDE" ]] && CL="$LEVEL_OVERRIDE"

          # Build the output string passed to --output (mirrors build-compression-params)
          case "$CT" in
            zstd)
              CP="compression=zstd,compression-level=${CL},force-compression=true" ;;
            gzip)
              CP="compression=gzip,compression-level=${CL},force-compression=true" ;;
            estargz-zstd|estargz-gzip|estargz)
              CP="compression=estargz,estargz-compression-level=${CL},estargz-chunk-size=4194304,force-compression=true" ;;
            uncompressed|none)
              CP="compression=uncompressed" ;;
            *)
              CT=zstd; CL=3
              CP="compression=zstd,compression-level=3,force-compression=true" ;;
          esac

          echo "compression_type=$CT"   >> "$GITHUB_OUTPUT"
          echo "compression_level=$CL"  >> "$GITHUB_OUTPUT"
          echo "compression_params=$CP" >> "$GITHUB_OUTPUT"
          echo "gc_keep_storage=$GC"    >> "$GITHUB_OUTPUT"
          echo "build_retry_count=$RC"  >> "$GITHUB_OUTPUT"
          echo "build_timeout_min=$TO"  >> "$GITHUB_OUTPUT"
          echo "resource_limit_pct=$RL" >> "$GITHUB_OUTPUT"

          echo "Profile=$PROFILE → $CT:$CL | gc=$GC | retry=$RC | timeout=${TO}m | resources=${RL}%"

  # ============================================================================
  # Job 1 — Pre-flight validation + check existing images
  # Mirrors check_dependencies() + validate_build_environment() + check-existing
  # ============================================================================
  check-releases:
    name: Check Releases & Validate
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    needs: resolve-profile
    outputs:
      versions_json:      ${{ steps.filter-excluded.outputs.versions_json || steps.determine-versions.outputs.versions_json }}
      should_build:       ${{ steps.filter-excluded.outputs.should_build || steps.determine-versions.outputs.should_build }}
      build_matrix:       ${{ steps.generate-matrix.outputs.matrix }}
      should_mark_stable: ${{ steps.check-stable.outputs.should_mark_stable }}
      stable_version:     ${{ steps.check-stable.outputs.stable_version }}
      action_type:        ${{ steps.set-action.outputs.action }}
      platforms:          ${{ steps.set-platforms.outputs.platforms }}
      compression_level:  ${{ needs.resolve-profile.outputs.compression_level }}
      compression_params: ${{ needs.resolve-profile.outputs.compression_params }}
      gc_keep_storage:    ${{ needs.resolve-profile.outputs.gc_keep_storage }}
      build_timeout_min:  ${{ needs.resolve-profile.outputs.build_timeout_min }}
      resource_limit_pct: ${{ needs.resolve-profile.outputs.resource_limit_pct }}
      base_combined_digest: ${{ steps.check-base-image.outputs.combined_digest }}
      # Pre-resolved base image refs (GHCR mirror if reachable, else Docker Hub
      # short name) — build-platform reuses these instead of re-probing per
      # matrix entry (saves ~4 imagetools calls × N entries).
      base_ref_haproxy: ${{ steps.resolve-base-refs.outputs.haproxy }}
      base_ref_builder: ${{ steps.resolve-base-refs.outputs.builder }}
      base_ref_runtime: ${{ steps.resolve-base-refs.outputs.runtime }}
      base_ref_xx:      ${{ steps.resolve-base-refs.outputs.xx }}
      nightly_sha:         ${{ steps.resolve-nightly.outputs.nightly_sha }}
      nightly_short_sha:   ${{ steps.resolve-nightly.outputs.nightly_short_sha }}
      nightly_skip_reason: ${{ steps.resolve-nightly.outputs.skip_reason }}
      # Populated by resolve-nightly when HEAD coincides with a release
      # (git tag OR published :X.Y.Z) AND force_build=true. Signals
      # determine-versions to inject the matching tag as a build entry
      # instead of skipping. Empty otherwise.
      rebuild_release:     ${{ steps.resolve-nightly.outputs.rebuild_release }}
      missing_releases_json: ${{ steps.discover-releases.outputs.missing_releases_json }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y curl jq skopeo

      - name: Set action type
        id: set-action
        run: |
          # Default to auto-check for non-dispatch triggers (e.g. cron-jobs.org
          # POST with no inputs.action). Without the default, every downstream
          # `if: steps.set-action.outputs.action == 'auto-check'` silently no-ops.
          echo "action=${{ env.IN_ACTION || 'auto-check' }}" >> "$GITHUB_OUTPUT"

      - name: Set platforms
        id: set-platforms
        run: |
          P="${{ env.IN_PLATFORMS }}"
          echo "platforms=${P:-${{ env.DEFAULT_PLATFORMS }}}" >> "$GITHUB_OUTPUT"

      - name: Validate compression config
        run: |
          CT="${{ needs.resolve-profile.outputs.compression_type }}"
          CL="${{ needs.resolve-profile.outputs.compression_level }}"
          case "$CT" in
            zstd)
              [[ "$CL" -ge 1 && "$CL" -le 22 ]] && echo "✅ zstd level $CL" \
                || { echo "❌ zstd level $CL out of range (1-22)"; exit 1; } ;;
            gzip)
              [[ "$CL" -ge 1 && "$CL" -le 9 ]]  && echo "✅ gzip level $CL" \
                || { echo "❌ gzip level $CL out of range (1-9)";  exit 1; } ;;
            *) echo "✅ $CT (no level validation needed)" ;;
          esac

      - name: Validate build environment
        run: |
          echo "=== Dependencies ==="
          for dep in docker curl skopeo jq; do
            command -v "$dep" &>/dev/null && echo "✅ $dep" || { echo "❌ $dep missing"; exit 1; }
          done
          docker buildx version &>/dev/null && echo "✅ docker buildx" || { echo "❌ docker buildx missing"; exit 1; }

          echo "=== Disk space ==="
          AVAIL=$(df . | awk 'NR==2 {print int($4/1024/1024)}')
          [[ $AVAIL -lt 10 ]] && echo "⚠️  Only ${AVAIL}GB available (10GB+ recommended)" \
                              || echo "✅ ${AVAIL}GB available"
          echo "✅ Pre-flight complete"

      - name: Login to registries
        uses: ./.github/actions/registry-login
        with:
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr_actor:         ${{ github.actor }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Check existing images by commit SHA
        id: check-existing
        run: |
          CURRENT_SHA="${{ env.UPSTREAM_REPO_SHA }}"
          SHORT_SHA="${CURRENT_SHA:0:7}"

          echo "Checking registries for commit: $CURRENT_SHA (sha-${SHORT_SHA})"

          # Helper: return the org.opencontainers.image.revision label of an image, or empty
          # Retries with backoff on transient / rate-limit failures
          get_revision() {
            local ref="$1" attempt max=3 wait
            for attempt in $(seq 1 $max); do
              local result err_out
              err_out="$(mktemp)"
              if result=$(skopeo inspect "docker://${ref}" 2>"$err_out"); then
                rm -f "$err_out"
                echo "$result" | jq -r '.Labels["org.opencontainers.image.revision"] // empty'
                return 0
              fi
              if grep -qiE '429|toomanyrequests|rate limit' "$err_out"; then
                wait=$(( attempt * 30 ))
                echo "  Rate limited inspecting ${ref} — backing off ${wait}s..." >&2
              else
                wait=$(( attempt * 5 ))
              fi
              rm -f "$err_out"
              [[ $attempt -lt $max ]] && sleep "$wait"
            done
            echo ""
          }

          # Check :latest on GHCR only — matches the rest of the fleet.
          # Docker Hub is authoritative for *publishing* but not for lookups;
          # inspecting DH manifests counts against the 200/6h anon pull quota
          # and produces 429s on large batch builds. GHCR has no such limit
          # for authenticated callers. registry-sync handles DH↔GHCR parity.
          GC_REF="${{ env.GHCR_REPO }}:latest"
          GC_SHA=$(get_revision "$GC_REF")

          echo "GHCR :latest revision = '${GC_SHA:-<not found>}'"

          GC_CURRENT="false"
          [[ "$GC_SHA" == "$CURRENT_SHA" ]] && GC_CURRENT="true"
          GC_EXISTS=$([[ -n "$GC_SHA" ]] && echo exists || echo missing)

          # Keep the dockerhub_* outputs for backward compatibility with
          # downstream steps/summary, but derive them from GHCR. DH state is
          # reconciled by registry-sync after each successful build.
          echo "dockerhub_status=$GC_EXISTS"    >> "$GITHUB_OUTPUT"
          echo "ghcr_status=$GC_EXISTS"         >> "$GITHUB_OUTPUT"
          echo "dockerhub_current=$GC_CURRENT"  >> "$GITHUB_OUTPUT"
          echo "ghcr_current=$GC_CURRENT"       >> "$GITHUB_OUTPUT"
          echo "head_sha=$CURRENT_SHA"          >> "$GITHUB_OUTPUT"
          echo "head_sha_short=sha-$SHORT_SHA"  >> "$GITHUB_OUTPUT"

          if [[ "$GC_CURRENT" == "true" ]]; then
            echo "commit_published=true" >> "$GITHUB_OUTPUT"
            echo "✅ Commit $SHORT_SHA already published to GHCR — will SKIP build"
          else
            echo "commit_published=false" >> "$GITHUB_OUTPUT"
            echo "🔨 Commit $SHORT_SHA not yet published to GHCR — will BUILD"
          fi

      - name: Check base image for updates
        id: check-base-image
        run: |
          UPDATE_ENABLED="${{ env.IN_UPDATE_BASE_IMAGE || env.UPDATE_BASE_IMAGE_ENABLED }}"
          if [[ "$UPDATE_ENABLED" != "true" ]]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "Base image update check disabled"
            exit 0
          fi

          # Track all four upstream bases — runtime (alpine) is the one that
          # actually ships in the final image and is most security-relevant,
          # but builder/xx/haproxy updates also warrant a rebuild so the
          # compiled binary picks up toolchain fixes.
          declare -A BASES=(
            [runtime]="${{ env.BASE_IMAGE_RUNTIME }}"
            [builder]="${{ env.BASE_IMAGE_BUILDER }}"
            [haproxy]="${{ env.HAPROXY_IMAGE }}"
            [xx]="${{ env.XX_IMAGE }}"
          )
          # Iterate in sorted key order so the combined hash is deterministic.
          # Bash associative-array iteration order is implementation-defined
          # and can vary across bash versions / runner updates, which would
          # spuriously change the hash even when no base image moved.
          COMBINED_DIGEST=""
          for label in $(printf '%s\n' "${!BASES[@]}" | sort); do
            img="${BASES[$label]}"
            [[ -z "$img" ]] && continue
            dig=$(skopeo inspect "docker://${img}" 2>/dev/null | jq -r '.Digest // "unknown"' || echo "unknown")
            [[ -z "$dig" || "$dig" == "null" ]] && dig="unknown"
            echo "  $label ($img) @ $dig"
            COMBINED_DIGEST="${COMBINED_DIGEST}${label}=${dig};"
          done
          if [[ -z "$COMBINED_DIGEST" ]]; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Could not determine any base image digest"
            exit 0
          fi
          CURRENT_HASH=$(printf '%s' "$COMBINED_DIGEST" | sha256sum | awk '{print $1}')
          echo "Combined base hash: $CURRENT_HASH"
          # Exported so the build step can stamp this hash into
          # org.opencontainers.image.base.digest on the new image, letting the
          # next run compare apples to apples.
          echo "combined_digest=$CURRENT_HASH" >> "$GITHUB_OUTPUT"

          # Inspect our own :latest on GHCR (no pull-rate limits for auth callers).
          CURRENT_IMAGE="${{ env.GHCR_REPO }}:latest"
          PREV_HASH=$(skopeo inspect "docker://${CURRENT_IMAGE}" 2>/dev/null \
            | jq -r '.Labels["org.opencontainers.image.base.digest"] // empty' || echo "")

          if [[ -z "$PREV_HASH" ]]; then
            # No prior hash label — conservative: treat as not updated, first
            # build after this change will set the label for future comparisons.
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "No prior base.digest label found — will populate on next build"
          elif [[ "$PREV_HASH" != "$CURRENT_HASH" ]]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "🔄 Base images changed (prev=$PREV_HASH, cur=$CURRENT_HASH)"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
            echo "✅ Base images unchanged"
          fi

      - name: Check 5-day stable promotion eligibility
        id: check-stable
        run: |
          # ── Read latest_sha_since from pipeline-state branch ──
          # This tracks when the current version first became :latest.
          # Only promote to :stable after 5 continuous days as :latest.
          LATEST_SHA_SINCE=""
          STATE_SHA=""
          if git fetch origin pipeline-state --depth=1 2>/dev/null; then
            LATEST_SHA_SINCE=$(git show origin/pipeline-state:latest-sha-since 2>/dev/null || echo "")
            STATE_SHA=$(git show origin/pipeline-state:last-built-sha 2>/dev/null || echo "")
          fi

          # Get the version label from current latest image (use GHCR to avoid DH rate limits)
          LATEST_VERSION=$(skopeo inspect "docker://${{ env.GHCR_REPO }}:latest" 2>/dev/null \
            | jq -r '.Labels["org.opencontainers.image.version"] // empty' || echo "")

          if [[ -z "$LATEST_SHA_SINCE" || -z "$STATE_SHA" ]]; then
            echo "No pipeline-state tracking data found — not yet eligible"
            echo "should_mark_stable=false" >> "$GITHUB_OUTPUT"
            echo "stable_version="          >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SINCE_EPOCH=$(date -d "$LATEST_SHA_SINCE" +%s 2>/dev/null || echo "0")
          NOW=$(date +%s)
          FIVE_DAYS=$(( 5 * 24 * 3600 ))
          DAYS_AS_LATEST=$(( (NOW - SINCE_EPOCH) / 86400 ))

          echo "Current :latest SHA has been active since $LATEST_SHA_SINCE ($DAYS_AS_LATEST days)"
          echo "  state SHA: $STATE_SHA | version: ${LATEST_VERSION:-unknown}"

          if [[ $SINCE_EPOCH -gt 0 && $(( NOW - SINCE_EPOCH )) -ge $FIVE_DAYS ]]; then
            echo "should_mark_stable=true"         >> "$GITHUB_OUTPUT"
            echo "stable_version=$LATEST_VERSION"  >> "$GITHUB_OUTPUT"
            echo "Eligible for stable promotion (>= 5 continuous days as :latest)"
          else
            echo "should_mark_stable=false" >> "$GITHUB_OUTPUT"
            echo "stable_version="          >> "$GITHUB_OUTPUT"
            echo "Not yet eligible ($DAYS_AS_LATEST days < 5 days required)"
          fi

      # ── Discover missing upstream version tags (auto-check only) ──────────
      # Lists semver tags on the upstream repo (via git ls-remote so tag-only
      # versions like v1.10.0 — pushed without a corresponding GitHub Release
      # — are not silently dropped by the Releases API), diffs them against
      # GHCR, and emits a JSON array of versions missing from the registry.
      # The strict semver regex excludes pre-release suffixes (-rc/-alpha/
      # -beta/-pre/-dev), preserving the prior --exclude-pre-releases
      # semantics. cron-jobs.org can then call auto-check daily and the
      # workflow will auto-build any newly tagged upstream version without
      # manual intervention.
      - name: Discover missing upstream releases
        id: discover-releases
        if: steps.set-action.outputs.action == 'auto-check'
        env:
          FORCE_TAG: ${{ env.IN_FORCE_RELEASE_TAG }}
        run: |
          # Retry-tolerant skopeo inspect. Distinguishes "image not present"
          # (404 / manifest unknown — definitive, no retry) from transient
          # registry errors (rate limit, 5xx — back off and retry). Without
          # the 404 fast-path the serial loop ballooned to ~10min on a fresh
          # GHCR repo because every probe maxed 3×backoff (~30s/version).
          rl_inspect() {
            local ref="$1" attempt err_file out
            err_file=$(mktemp)
            for attempt in 1 2 3; do
              if skopeo inspect "docker://${ref}" >/dev/null 2>"$err_file"; then
                rm -f "$err_file"; echo yes; return 0
              fi
              if grep -qE 'manifest unknown|name unknown|NAME_UNKNOWN|repository name not known|404' "$err_file"; then
                rm -f "$err_file"; echo no; return 0
              fi
              [[ $attempt -lt 3 ]] && sleep $(( attempt * 10 ))
            done
            rm -f "$err_file"
            echo no
          }
          export -f rl_inspect

          # Per-version probe runner for parallel xargs. Stdout is harvested
          # back into MISSING; status logging goes to stderr so it doesn't
          # contaminate the version list.
          probe_version() {
            local ver="$1"
            if [[ -n "$FORCE_TAG" && "$ver" == "$FORCE_TAG" ]]; then
              echo "  ⚡ $ver force-rebuild requested" >&2
              echo "$ver"
              return
            fi
            if [[ "$(rl_inspect "${GHCR_REPO}:${ver}")" == "no" ]]; then
              echo "  ➕ $ver not in GHCR — will build" >&2
              echo "$ver"
            fi
          }
          export -f probe_version
          export FORCE_TAG GHCR_REPO="${{ env.GHCR_REPO }}"

          # Discover upstream version tags via git ls-remote rather than the
          # Releases API. Some upstream tags (e.g. v1.10.0) are pushed without
          # a corresponding GitHub Release publish; the Releases API would
          # silently skip them. --refs hides the peeled-tag (^{}) duplicates
          # that ls-remote emits for annotated tags. The strict semver regex
          # excludes pre-release suffixes to match the prior
          # --exclude-pre-releases behaviour.
          ALL_VERS=$(git ls-remote --tags --refs https://github.com/FreePeak/db-mcp-server.git 2>/dev/null \
            | awk -F'refs/tags/' '{print $2}' \
            | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed 's/^v//' \
            | sort -uV || echo "")

          if [[ -z "$ALL_VERS" ]]; then
            echo "::warning::Upstream tag list fetch failed — skipping release discovery"
            echo "missing_releases_json=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Drop EXCLUDE_VERSIONS up-front so the GHCR probe loop never
          # runs against versions we have no intention of building. Avoids
          # the "➕ X not in GHCR — will build" log line for excluded
          # tags (fixed downstream by filter-excluded, but the wording
          # was misleading) and shaves off N skopeo probes.
          if [[ -n "${EXCLUDE_VERSIONS:-}" ]]; then
            EXCLUDE_LIST=$(echo "$EXCLUDE_VERSIONS" | tr ',' '\n' | sed 's/^ *//; s/ *$//' | sed '/^$/d')
            if [[ -n "$EXCLUDE_LIST" ]]; then
              SKIPPED=$(comm -12 <(echo "$ALL_VERS" | sort) <(echo "$EXCLUDE_LIST" | sort) | tr '\n' ' ')
              ALL_VERS=$(comm -23 <(echo "$ALL_VERS" | sort) <(echo "$EXCLUDE_LIST" | sort) | sort -V)
              [[ -n "$SKIPPED" ]] && echo "  🚫 Excluded by EXCLUDE_VERSIONS: ${SKIPPED% }"
            fi
          fi

          if [[ -z "$ALL_VERS" ]]; then
            echo "✅ All upstream tags excluded — nothing to probe"
            echo "missing_releases_json=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Parallel probe: -P 20 caps concurrency to match matrix max-parallel.
          # FORCE_TAG comes through env: to avoid shell injection if a user
          # pastes metachars into the workflow_dispatch input field.
          mapfile -t MISSING < <(echo "$ALL_VERS" \
            | xargs -P 20 -I{} bash -c 'probe_version "$@"' _ {} \
            | sort -V)

          # Validate force_release_tag matched an actual upstream release
          if [[ -n "$FORCE_TAG" ]]; then
            FOUND=0
            for m in "${MISSING[@]}"; do [[ "$m" == "$FORCE_TAG" ]] && FOUND=1; done
            if [[ "$FOUND" == "0" ]]; then
              echo "::error::force_release_tag=$FORCE_TAG did not match any upstream release"
              exit 1
            fi
          fi

          if [[ ${#MISSING[@]} -eq 0 ]]; then
            echo "✅ All upstream releases already present in GHCR"
            echo "missing_releases_json=[]" >> "$GITHUB_OUTPUT"
          else
            JSON=$(printf '%s\n' "${MISSING[@]}" | jq -R . | jq -sc .)
            echo "missing_releases_json=$JSON" >> "$GITHUB_OUTPUT"
            echo "🔨 Missing releases: ${MISSING[*]}"
          fi

      # ── Resolve nightly candidate (auto-check only) ────────────────────────
      # Compares upstream default-branch HEAD against:
      #   1. Every release tag SHA — skip if HEAD is already a tagged commit
      #      (that commit gets built via discover-releases as :X.Y.Z instead).
      #   2. Current :nightly label org.opencontainers.image.revision — skip
      #      if already published as the latest nightly.
      # git ls-remote over smart-HTTP avoids the GitHub REST unauthenticated
      # rate limit (~60/hr/IP) and handles annotated tags uniformly via the
      # ^{} peel line (dereferenced commit SHA).
      - name: Resolve nightly candidate
        id: resolve-nightly
        if: steps.set-action.outputs.action == 'auto-check'
        env:
          SKIP_NIGHTLY_SHAS: ${{ vars.SKIP_NIGHTLY_SHAS }}
          FORCE_NIGHTLY: ${{ env.IN_FORCE_NIGHTLY }}
          FORCE_BUILD:   ${{ env.IN_FORCE_BUILD }}
          SHA_OVERRIDE:  ${{ env.IN_NIGHTLY_SHA_OVERRIDE }}
        run: |
          # Emit empty-output skip helper. Call as:  skip "reason"
          skip() {
            echo "⏭️  $1"
            {
              echo "nightly_sha="
              echo "nightly_short_sha="
              echo "rebuild_release="
              echo "skip_reason=$1"
            } >> "$GITHUB_OUTPUT"
            exit 0
          }
          # Emit release-rebuild redirect. Call as:  redirect_release "<tag>" "<reason>"
          redirect_release() {
            local tag="$1" reason="$2"
            echo "♻  $reason — redirecting to :$tag rebuild (force_build=true)"
            {
              echo "nightly_sha="
              echo "nightly_short_sha="
              echo "rebuild_release=$tag"
              echo "skip_reason=$reason"
            } >> "$GITHUB_OUTPUT"
            exit 0
          }

          # Retry-tolerant ls-remote HEAD — transient DNS/TLS blips shouldn't
          # silently skip nightly for the whole cron tick.
          resolve_head() {
            local attempt sha
            for attempt in 1 2 3; do
              sha=$(git ls-remote https://github.com/FreePeak/db-mcp-server.git HEAD 2>/dev/null | awk '{print $1}')
              if [[ -n "$sha" ]]; then echo "$sha"; return 0; fi
              [[ $attempt -lt 3 ]] && sleep $(( attempt * 10 ))
            done
            return 1
          }

          # Priority: override > HEAD
          if [[ -n "$SHA_OVERRIDE" ]]; then
            if [[ ! "$SHA_OVERRIDE" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "::error::nightly_sha_override must be a 40-char commit SHA"
              exit 1
            fi
            CANDIDATE_SHA="${SHA_OVERRIDE,,}"
            echo "⚡ Nightly SHA override: $CANDIDATE_SHA"
          else
            if ! CANDIDATE_SHA=$(resolve_head); then
              echo "::warning::Could not resolve upstream HEAD after 3 attempts — skipping nightly"
              skip "ls-remote HEAD failed"
            fi
            echo "Upstream HEAD: $CANDIDATE_SHA"
          fi

          # ── Gate 1: SKIP_NIGHTLY_SHAS denylist (fail-closed) ────────────────
          # Operator escape hatch for known-bad commits — overrides ALL force
          # flags to prevent accidental rebuilds. Each entry >=12 hex chars
          # so short-SHA prefix collisions are not possible.
          if [[ -n "$SKIP_NIGHTLY_SHAS" ]]; then
            IFS=',' read -ra SKIP_ARR <<< "$SKIP_NIGHTLY_SHAS"
            for s in "${SKIP_ARR[@]}"; do
              s=$(echo "$s" | xargs)
              [[ -z "$s" ]] && continue
              if [[ ! "$s" =~ ^[0-9a-fA-F]{12,40}$ ]]; then
                echo "::error::SKIP_NIGHTLY_SHAS entry '$s' must be 12-40 hex chars"
                exit 1
              fi
              s_lc="${s,,}"
              cand_lc="${CANDIDATE_SHA,,}"
              if [[ "$cand_lc" == "$s_lc"* ]]; then
                skip "SHA in SKIP_NIGHTLY_SHAS repo variable (matched prefix '$s')"
              fi
            done
          fi

          # ── Gate 2: On-main ancestry guard ─────────────────────────────────
          # Only meaningful when SHA_OVERRIDE is set — the ls-remote HEAD path
          # already resolves to the tip of the default branch by definition.
          # Shallow-fetch main into a scratch bare repo so merge-base can work
          # without cloning full history.
          if [[ -n "$SHA_OVERRIDE" ]]; then
            SCRATCH=$(mktemp -d)
            (
              cd "$SCRATCH" || { echo "::error::could not cd to scratch dir $SCRATCH"; exit 1; }
              git init --bare --quiet
              # Fetch main with generous depth for ancestry traversal AND the
              # specific candidate commit — handles the case where CANDIDATE
              # is on main but older than the shallow depth of a main fetch
              # alone (would otherwise false-positive as "not on main").
              if ! git fetch --depth=500 --quiet \
                    https://github.com/FreePeak/db-mcp-server.git \
                    refs/heads/main:refs/heads/main 2>/dev/null; then
                echo "::error::Could not fetch upstream main for on-main ancestry check"
                exit 1
              fi
              if ! git cat-file -e "$CANDIDATE_SHA" 2>/dev/null; then
                # Candidate not in the 500-commit window of main — fetch it
                # directly. If THIS fetch fails, the commit likely does not
                # exist in the remote at all (or is on a non-main ref GitHub
                # allows fetching).
                if ! git fetch --depth=1 --quiet \
                      https://github.com/FreePeak/db-mcp-server.git \
                      "$CANDIDATE_SHA" 2>/dev/null; then
                  echo "::error::$CANDIDATE_SHA does not exist in upstream repo — refusing nightly build"
                  exit 1
                fi
              fi
              if ! git merge-base --is-ancestor "$CANDIDATE_SHA" refs/heads/main 2>/dev/null; then
                echo "::error::$CANDIDATE_SHA is not an ancestor of upstream main — refusing nightly build"
                exit 1
              fi
            )
            rm -rf "$SCRATCH"
            echo "✓ $CANDIDATE_SHA is on upstream main"
          fi

          # ── Gate 3: Upstream git-tag match ─────────────────────────────────
          # If HEAD is any annotated or lightweight tag, it IS a release commit.
          # Never build nightly for it. force_build=true redirects to rebuilding
          # that :X.Y.Z instead. Fail-closed on network error so a release
          # commit cannot slip through as nightly during a transient outage.
          TAGS_RAW=""
          for attempt in 1 2 3; do
            TAGS_RAW=$(git ls-remote --tags https://github.com/FreePeak/db-mcp-server.git 2>/dev/null) \
              && [[ -n "$TAGS_RAW" ]] && break
            [[ $attempt -lt 3 ]] && sleep $(( attempt * 10 ))
          done
          if [[ -z "$TAGS_RAW" ]]; then
            echo "::error::Could not fetch upstream tag list after 3 attempts — refusing to build nightly without release-commit check"
            exit 1
          fi

          # Awk: peel annotated tags so tags[name]=commit-sha regardless of kind.
          TAG_SHAS=$(echo "$TAGS_RAW" \
            | awk '/\^\{\}$/ { tags[$2]=$1; next } { if (!($2 in tags)) tags[$2]=$1 } END { for (t in tags) print tags[t] }' \
            | sort -u)

          if echo "$TAG_SHAS" | grep -qxF "$CANDIDATE_SHA"; then
            MATCHED_TAG=$(echo "$TAGS_RAW" \
              | awk -v s="$CANDIDATE_SHA" '$1==s && $2 !~ /\^\{\}$/ { sub("refs/tags/","",$2); print $2 }' \
              | head -1)
            # Strip leading 'v' so downstream uses the same X.Y.Z string.
            MATCHED_VER="${MATCHED_TAG#v}"
            if [[ "$FORCE_BUILD" == "true" ]]; then
              redirect_release "$MATCHED_VER" "HEAD matches upstream release tag $MATCHED_TAG"
            else
              skip "HEAD matches upstream release tag $MATCHED_TAG (set force_build=true to rebuild :$MATCHED_VER)"
            fi
          fi

          # ── Gate 4: GHCR registry-label scan ───────────────────────────────
          # Source of truth for "already published as a release" is the image
          # revision label, not git tags. Catches the case where upstream
          # hasn't cut a tag yet but we already pushed :X.Y.Z for that commit,
          # and the case where a previous run built a release but the
          # pipeline-state branch wasn't updated.
          # Fail-closed on scan error (per-run impact: any transient 5xx from
          # GHCR would otherwise silently promote a released SHA to :nightly).
          GHCR_TAGS_JSON=""
          GHCR_SCAN_STATUS="unset"
          for attempt in 1 2 3; do
            GHCR_ERR=$(mktemp)
            if GHCR_TAGS_JSON=$(skopeo list-tags \
                 --creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
                 "docker://${{ env.GHCR_REPO }}" 2>"$GHCR_ERR") \
                 && [[ -n "$GHCR_TAGS_JSON" ]]; then
              GHCR_SCAN_STATUS="ok"
              rm -f "$GHCR_ERR"
              break
            fi
            # First-publish: repo not yet created in GHCR. Treat as empty
            # tag set so gate can pass cleanly on the very first build.
            if grep -qE 'name unknown|NAME_UNKNOWN|manifest unknown|repository name not known' "$GHCR_ERR"; then
              echo "ℹ️  GHCR repo ${{ env.GHCR_REPO }} not found — first publish, treating tag list as empty"
              GHCR_TAGS_JSON='{"Tags":[]}'
              GHCR_SCAN_STATUS="empty"
              rm -f "$GHCR_ERR"
              break
            fi
            cat "$GHCR_ERR" >&2
            rm -f "$GHCR_ERR"
            [[ $attempt -lt 3 ]] && sleep $(( attempt * 10 ))
          done
          if [[ "$GHCR_SCAN_STATUS" == "unset" ]]; then
            echo "::error::Could not list GHCR tags after 3 attempts — refusing nightly build without release-label scan"
            exit 1
          fi

          # Keep only strict semver (X.Y.Z). Excludes :latest, :stable, :nightly,
          # :nightly-*, :sha-*, and any promotion pointers. Pre-release
          # upstream tags (:X.Y.Z-rc1 etc.) are caught by gate 3 since we
          # never publish them to GHCR for this image.
          RELEASE_TAGS=$(echo "$GHCR_TAGS_JSON" \
            | jq -r '.Tags[] | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))')

          # Rate-limit/transient-error tolerant inspect. Fail-closed after
          # retries so a flaky registry can never silently let a released
          # SHA slip through as :nightly (would violate the core rule).
          inspect_revision() {
            local ref="$1" attempt out
            for attempt in 1 2 3; do
              out=$(skopeo inspect \
                --creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
                "docker://${ref}" 2>/dev/null) && {
                echo "$out" | jq -r '.Labels["org.opencontainers.image.revision"] // empty'
                return 0
              }
              [[ $attempt -lt 3 ]] && sleep $(( attempt * 5 ))
            done
            return 1
          }

          for T in $RELEASE_TAGS; do
            if ! REV=$(inspect_revision "${{ env.GHCR_REPO }}:${T}"); then
              echo "::error::Could not inspect :$T after 3 attempts — refusing nightly build without complete release-label scan"
              exit 1
            fi
            if [[ -n "$REV" && "$REV" == "$CANDIDATE_SHA" ]]; then
              if [[ "$FORCE_BUILD" == "true" ]]; then
                redirect_release "$T" "HEAD already published as :$T in GHCR"
              else
                skip "HEAD already published as :$T in GHCR (set force_build=true to rebuild)"
              fi
            fi
          done

          # ── Gate 5: :nightly manifest label match ──────────────────────────
          # Only gate that force_nightly bypasses. Useful for retrying a failed
          # nightly on the same HEAD, or rebuilding when base-image-only
          # changes invalidate the old layer digests. Fail-open on inspect
          # error here (unlike gate 4) because worst case is one wasted
          # duplicate :nightly build, not a rule violation.
          if [[ "$FORCE_NIGHTLY" != "true" ]]; then
            NIGHTLY_REV=$(inspect_revision "${{ env.GHCR_REPO }}:nightly" || echo "")
            if [[ -n "$NIGHTLY_REV" && "$NIGHTLY_REV" == "$CANDIDATE_SHA" ]]; then
              skip "HEAD already built as :nightly (set force_nightly=true to retry)"
            fi
          else
            echo "⚡ force_nightly=true — bypassing :nightly label-match check"
          fi

          # ── Clear to build ─────────────────────────────────────────────────
          SHORT="${CANDIDATE_SHA:0:7}"
          echo "🌙 Nightly candidate: $CANDIDATE_SHA (short: $SHORT)"
          {
            echo "nightly_sha=$CANDIDATE_SHA"
            echo "nightly_short_sha=$SHORT"
            echo "rebuild_release="
            echo "skip_reason="
          } >> "$GITHUB_OUTPUT"

      - name: Determine versions to build
        id: determine-versions
        run: |
          ACTION="${{ steps.set-action.outputs.action }}"
          FORCE="${{ env.IN_FORCE_BUILD }}"
          SKIP_EXISTING="${{ env.IN_SKIP_EXISTING || 'true' }}"
          BASE_UPDATED="${{ steps.check-base-image.outputs.updated }}"
          UPDATE_ENABLED="${{ env.IN_UPDATE_BASE_IMAGE || env.UPDATE_BASE_IMAGE_ENABLED }}"

          # For git-tag pushes, version = tag name (strip leading 'v')
          GIT_TAG_VERSION=""
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            GIT_TAG_VERSION="${{ github.ref_name }}"
            GIT_TAG_VERSION="${GIT_TAG_VERSION#v}"
          fi

          case "$ACTION" in
            auto-check)
              COMMIT_PUBLISHED="${{ steps.check-existing.outputs.commit_published }}"
              MISSING_JSON='${{ steps.discover-releases.outputs.missing_releases_json }}'
              NIGHTLY_SHA='${{ steps.resolve-nightly.outputs.nightly_sha }}'
              NIGHTLY_REASON='${{ steps.resolve-nightly.outputs.skip_reason }}'
              REBUILD_RELEASE='${{ steps.resolve-nightly.outputs.rebuild_release }}'

              # Start from the set of release versions missing from GHCR.
              ENTRIES="${MISSING_JSON:-[]}"
              # jq-safety: if the step didn't run (e.g. set-action bypassed), default to []
              echo "$ENTRIES" | jq . >/dev/null 2>&1 || ENTRIES='[]'

              # Release rebuild redirect from resolve-nightly (HEAD coincides
              # with a release AND force_build=true). Injected as a first-
              # class build entry; de-duplicated against missing_releases_json
              # so the matrix never has the same version twice.
              if [[ -n "$REBUILD_RELEASE" ]]; then
                ENTRIES=$(echo "$ENTRIES" | jq -c --arg v "$REBUILD_RELEASE" '. + [$v] | unique')
                echo "♻  Release rebuild enqueued: $REBUILD_RELEASE (force_build)"
              fi

              # Append nightly sentinel if HEAD is fresh and distinct from
              # releases. Mutually exclusive with release-rebuild redirect —
              # resolve-nightly never emits both in the same run.
              if [[ -z "$REBUILD_RELEASE" && -n "$NIGHTLY_SHA" ]]; then
                ENTRIES=$(echo "$ENTRIES" | jq -c '. + ["nightly"]')
                echo "🌙 Nightly candidate enqueued ($NIGHTLY_SHA)"
              elif [[ -n "$NIGHTLY_REASON" ]]; then
                echo "🌙 Nightly skipped: $NIGHTLY_REASON"
              fi

              HAS_WORK=$(echo "$ENTRIES" | jq 'length')

              # Renovate-pinned fallback: only runs when release + nightly paths
              # produced nothing. Preserves historical auto-check behavior for
              # legacy PR-merge triggers that don't carry release info.
              if [[ "$HAS_WORK" == "0" ]]; then
                # Resolve version label from current :latest on GHCR (no DH rate limit)
                if [[ -n "$GIT_TAG_VERSION" ]]; then
                  BUILD_VER="$GIT_TAG_VERSION"
                else
                  BUILD_VER=$(skopeo inspect "docker://${{ env.GHCR_REPO }}:latest" 2>/dev/null \
                    | jq -r '.Labels["org.opencontainers.image.version"] // empty' || echo "")
                  [[ -z "$BUILD_VER" ]] && BUILD_VER="latest-from-source"
                fi

                SHOULD_FALLBACK="false"
                if [[ "$COMMIT_PUBLISHED" == "true" && "$FORCE" != "true" ]]; then
                  echo "⏭️  Commit ${{ env.UPSTREAM_REPO_SHA }} already published — no fallback build"
                elif [[ "$COMMIT_PUBLISHED" == "partial" ]]; then
                  echo "🔄 Commit published to one registry — fallback to sync the other"
                  SHOULD_FALLBACK="true"
                elif [[ "$COMMIT_PUBLISHED" == "false" ]]; then
                  echo "🔨 Renovate SHA not yet published — fallback build"
                  SHOULD_FALLBACK="true"
                fi
                [[ "$FORCE" == "true" ]] && { echo "⚡ Force build requested"; SHOULD_FALLBACK="true"; }
                [[ "$BASE_UPDATED" == "true" && "$UPDATE_ENABLED" == "true" ]] && {
                  echo "🔄 Base image updated — fallback rebuild"
                  SHOULD_FALLBACK="true"
                }

                if [[ "$SHOULD_FALLBACK" == "true" ]]; then
                  ENTRIES=$(jq -cn --arg v "$BUILD_VER" '[$v]')
                fi
              else
                echo "📦 Release-sync + nightly path active — Renovate fallback suppressed"
              fi

              FINAL_LEN=$(echo "$ENTRIES" | jq 'length')
              if [[ "$FINAL_LEN" -gt 0 ]]; then
                CSV=$(echo "$ENTRIES" | jq -r 'join(",")')
                echo "versions=$CSV"             >> "$GITHUB_OUTPUT"
                echo "versions_json=$ENTRIES"    >> "$GITHUB_OUTPUT"
                echo "should_build=true"         >> "$GITHUB_OUTPUT"
                echo "🚀 Auto-check will build: $CSV"
              else
                echo "versions="           >> "$GITHUB_OUTPUT"
                echo "versions_json=[]"    >> "$GITHUB_OUTPUT"
                echo "should_build=false"  >> "$GITHUB_OUTPUT"
                echo "✅ Nothing to build — registry is up to date"
              fi
              ;;

            build-versions)
              INPUT="${{ env.IN_VERSIONS }}"
              if [[ -z "$INPUT" ]]; then
                if [[ "$FORCE" == "true" ]]; then
                  # Force build without explicit versions: resolve current version from GHCR
                  # (Docker Hub inspection is rate-limited; GHCR is not).
                  INPUT=$(skopeo inspect "docker://${{ env.GHCR_REPO }}:latest" 2>/dev/null \
                    | jq -r '.Labels["org.opencontainers.image.version"] // empty' || echo "")
                  [[ -z "$INPUT" ]] && INPUT="latest-from-source"
                  echo "⚡ Force build: no versions specified, using '$INPUT'"
                else
                  echo "versions=" >> "$GITHUB_OUTPUT"
                  echo "versions_json=[]" >> "$GITHUB_OUTPUT"
                  echo "should_build=false" >> "$GITHUB_OUTPUT"
                  exit 0
                fi
              fi

              # Range detection: X.Y.Z-A.B.C format.
              # Previously emitted just "$START,$END" (two builds). Now expands
              # to the full set of stable upstream releases between START and END
              # inclusive, semver-sorted. Prereleases and drafts are excluded.
              if [[ "$INPUT" =~ ^[0-9]+\.[0-9]+\.[0-9]+-[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                START="${INPUT%-*}"
                END="${INPUT#*-}"
                echo "Expanding range ${START}-${END} via FreePeak/db-mcp-server releases"

                # gh CLI has built-in retry on 5xx; wrap in 3-attempt loop for
                # network / token hiccups on top.
                ALL_VERS=""
                for attempt in 1 2 3; do
                  ALL_VERS=$(GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh release list \
                    --repo FreePeak/db-mcp-server \
                    --limit 100 \
                    --exclude-drafts --exclude-pre-releases \
                    --json tagName \
                    --jq '.[].tagName' 2>/dev/null \
                    | sed 's/^v//' | sort -V) || ALL_VERS=""
                  [[ -n "$ALL_VERS" ]] && break
                  [[ $attempt -lt 3 ]] && sleep $(( attempt * 10 ))
                done

                if [[ -z "$ALL_VERS" ]]; then
                  echo "❌ Could not fetch upstream release list after 3 attempts" >&2
                  exit 1
                fi

                FILTERED=""
                while IFS= read -r ver; do
                  [[ -z "$ver" ]] && continue
                  # ver >= START && ver <= END (semver comparisons via sort -VC)
                  if printf '%s\n%s\n' "$START" "$ver" | sort -VC \
                     && printf '%s\n%s\n' "$ver" "$END" | sort -VC; then
                    FILTERED="${FILTERED:+$FILTERED,}$ver"
                  fi
                done <<< "$ALL_VERS"

                if [[ -z "$FILTERED" ]]; then
                  echo "❌ Range ${START}-${END} matched zero upstream releases" >&2
                  exit 1
                fi
                echo "Range ${START}-${END} expanded to: $FILTERED"
                INPUT="$FILTERED"
              fi

              # Filter existing if skip_existing
              FILTERED=""
              IFS=',' read -ra ARR <<< "$INPUT"
              # Rate-limit tolerant inspect helper
              rl_inspect() {
                local ref="$1" attempt
                for attempt in 1 2 3; do
                  if skopeo inspect "docker://${ref}" &>/dev/null; then echo yes; return 0; fi
                  [[ $attempt -lt 3 ]] && sleep $(( attempt * 10 ))
                done
                echo no
              }

              for ver in "${ARR[@]}"; do
                ver=$(echo "$ver" | xargs)
                if [[ "$SKIP_EXISTING" == "true" && "$FORCE" != "true" ]]; then
                  # Check GHCR only — matches the rest of the fleet.
                  # registry-sync reconciles Docker Hub after each successful
                  # build, so GHCR presence is the authoritative "already built"
                  # signal and avoids Hub manifest-GET rate limits.
                  GC=$(rl_inspect "${{ env.GHCR_REPO }}:${ver}")
                  if [[ "$GC" == "yes" ]]; then
                    echo "::notice::Skipping $ver — already in GHCR"
                    continue
                  fi
                fi
                FILTERED="${FILTERED:+$FILTERED,}$ver"
              done

              if [[ -z "$FILTERED" ]]; then
                echo "versions=" >> "$GITHUB_OUTPUT"
                echo "versions_json=[]" >> "$GITHUB_OUTPUT"
                echo "should_build=false" >> "$GITHUB_OUTPUT"
              else
                JSON=$(printf '%s\n' "$FILTERED" | tr ',' '\n' | jq -R . | jq -sc .)
                echo "versions=$FILTERED"      >> "$GITHUB_OUTPUT"
                echo "versions_json=$JSON"     >> "$GITHUB_OUTPUT"
                echo "should_build=true"       >> "$GITHUB_OUTPUT"
              fi
              ;;

            promote-image|sync-registries|mark-stable)
              echo "versions="       >> "$GITHUB_OUTPUT"
              echo "versions_json=[]" >> "$GITHUB_OUTPUT"
              echo "should_build=false" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Filter excluded versions
        id: filter-excluded
        if: env.EXCLUDE_VERSIONS != ''
        run: |
          VERSIONS_CSV="${{ steps.determine-versions.outputs.versions }}"
          SHOULD_BUILD="${{ steps.determine-versions.outputs.should_build }}"

          # Nothing to filter if no versions or not building
          if [[ -z "$VERSIONS_CSV" || "$SHOULD_BUILD" != "true" ]]; then
            exit 0
          fi

          # Build exclusion regex from comma-separated EXCLUDE_VERSIONS.
          # Dots are regex-escaped so "1.8.0" only matches the literal version,
          # not "1a8a0" or similar.
          EXCLUDE_PATTERN="$(echo "$EXCLUDE_VERSIONS" \
            | tr ',' '\n' \
            | sed 's/^ *//; s/ *$//' \
            | sed '/^$/d' \
            | sed 's/\./\\./g' \
            | paste -sd '|')"

          FILTERED=""
          EXCLUDED_COUNT=0
          IFS=',' read -ra ARR <<< "$VERSIONS_CSV"
          for ver in "${ARR[@]}"; do
            ver="$(echo "$ver" | xargs)"
            if echo "$ver" | grep -Exq "$EXCLUDE_PATTERN"; then
              echo "Excluding version: $ver"
              (( EXCLUDED_COUNT++ )) || true
            else
              FILTERED="${FILTERED:+$FILTERED,}$ver"
            fi
          done

          if [[ "$EXCLUDED_COUNT" -gt 0 ]]; then
            echo "Excluded $EXCLUDED_COUNT version(s): $EXCLUDE_VERSIONS"
          fi

          if [[ -z "$FILTERED" ]]; then
            echo "All versions excluded — nothing to build"
            echo "versions=" >> "$GITHUB_OUTPUT"
            echo "versions_json=[]" >> "$GITHUB_OUTPUT"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Rebuild JSON array
          JSON=$(printf '%s\n' "$FILTERED" | tr ',' '\n' | jq -R . | jq -sc .)
          echo "versions=$FILTERED" >> "$GITHUB_OUTPUT"
          echo "versions_json=$JSON" >> "$GITHUB_OUTPUT"
          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "Versions after exclusion filter: $FILTERED"

      - name: Generate build matrix
        id: generate-matrix
        run: |
          VERSIONS='${{ steps.filter-excluded.outputs.versions_json || steps.determine-versions.outputs.versions_json }}'
          PLATFORMS="${{ steps.set-platforms.outputs.platforms }}"

          if [[ "$VERSIONS" == "[]" || -z "$VERSIONS" ]]; then
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Build [{version, platform, platform_slug, runner}, ...]
          # Runner affinity lookup table: maps each Docker platform to a runner suffix
          ACTION_RUNNER="${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-24.04' }}"
          # Allow an override for riscv64 since GitHub-hosted has no riscv
          # runner label; users with a self-hosted pool can point this at
          # the right suffix (e.g. "-riscv-selfhosted") or the empty string
          # to emulate via QEMU on an amd64 runner.
          RISCV_SUFFIX="${{ vars.ACTION_RUNNER_RISCV_SUFFIX || '-riscv' }}"
          runner_suffix_for() {
            case "$1" in
              linux/amd64)    echo "" ;;              # native amd64
              linux/arm64)    echo "-arm" ;;          # native arm64
              linux/arm/v7)   echo "-arm" ;;          # arm64 runner, native ARM32 compat
              linux/arm/v6)   echo "-arm" ;;          # arm64 runner, native ARM32 compat
              linux/riscv64)  echo "$RISCV_SUFFIX" ;; # riscv64 (requires self-hosted pool unless overridden)
              linux/386)      echo "" ;;              # amd64 runner, native i386 compat
              linux/s390x)    echo "" ;;              # amd64 runner, QEMU
              linux/ppc64le)  echo "" ;;              # amd64 runner, QEMU
              linux/mips64le) echo "" ;;              # amd64 runner, QEMU
              *)              echo "" ;;              # fallback to amd64 runner
            esac
          }

          # Build the JSON matrix using the lookup table
          MATRIX="["
          FIRST=true
          RISCV_WARNED=false
          for v in $(echo "$VERSIONS" | jq -r '.[]'); do
            IFS=',' read -ra PLAT_ARRAY <<< "$(echo "$PLATFORMS" | tr -d ' ')"
            for p in "${PLAT_ARRAY[@]}"; do
              [ -z "$p" ] && continue
              SUFFIX=$(runner_suffix_for "$p")
              RUNNER="${ACTION_RUNNER}${SUFFIX}"
              # Warn once if a riscv64 entry will queue on a label that does
              # not exist as a GitHub-hosted runner and no override is set.
              if [[ "$p" == "linux/riscv64" && "$SUFFIX" == "-riscv" && "$RISCV_WARNED" == "false" && -z "${{ vars.ACTION_RUNNER_RISCV_SUFFIX }}" ]]; then
                echo "::warning::linux/riscv64 resolved to runner label '$RUNNER' but GitHub-hosted does not provide riscv runners. Set repo var ACTION_RUNNER_RISCV_SUFFIX (e.g. '' for QEMU emulation on amd64, or a self-hosted suffix) to avoid indefinite queuing."
                RISCV_WARNED=true
              fi
              SLUG=$(echo "$p" | tr '/' '-')
              $FIRST || MATRIX+=","
              FIRST=false
              MATRIX+=$(jq -nc --arg v "$v" --arg p "$p" --arg s "$SLUG" --arg r "$RUNNER" \
                '{version:$v, platform:$p, platform_slug:$s, runner:$r}')
            done
          done
          MATRIX+="]"

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Matrix: $(echo $MATRIX | jq length) entries"

      # ── Probe base image mirrors once (build-platform reuses the output) ──
      # GHCR mirror reachable from this runner is almost certainly reachable
      # from every matrix runner too (GHCR is public). Self-hosted runners
      # with restricted firewalls are the only edge case; they'd need to
      # probe locally. For the normal GitHub-hosted case, this cuts 4 probes
      # per matrix entry down to 4 probes total per workflow.
      - name: Resolve base image refs
        id: resolve-base-refs
        run: |
          probe() {
            local desired="$1" label="$2"
            if [[ -z "$desired" ]]; then echo ""; return; fi
            if docker buildx imagetools inspect "$desired" >/dev/null 2>&1; then
              echo "$desired"
            else
              local fallback="${desired##*/}"
              echo "$label: '$desired' unreachable — falling back to '$fallback'" >&2
              echo "$fallback"
            fi
          }
          HAPROXY_REF=$(probe "${{ env.HAPROXY_IMAGE }}"       "HAProxy")
          BUILDER_REF=$(probe "${{ env.BASE_IMAGE_BUILDER }}"  "Builder")
          RUNTIME_REF=$(probe "${{ env.BASE_IMAGE_RUNTIME }}"  "Runtime")
          XX_REF=$(probe      "${{ env.XX_IMAGE }}"            "xx")
          echo "haproxy=$HAPROXY_REF" >> "$GITHUB_OUTPUT"
          echo "builder=$BUILDER_REF" >> "$GITHUB_OUTPUT"
          echo "runtime=$RUNTIME_REF" >> "$GITHUB_OUTPUT"
          echo "xx=$XX_REF"           >> "$GITHUB_OUTPUT"
          echo "Resolved base refs:"
          echo "  haproxy → $HAPROXY_REF"
          echo "  builder → $BUILDER_REF"
          echo "  runtime → $RUNTIME_REF"
          echo "  xx      → $XX_REF"

      - name: Preflight summary
        run: |
          {
            echo "## 🔍 Release Check Summary"
            echo "| Property | Value |"
            echo "|---|---|"
            echo "| Action | ${{ steps.set-action.outputs.action }} |"
            echo "| Workflow SHA | \`${{ github.sha }}\` |"
            echo "| Upstream SHA | \`${{ env.UPSTREAM_REPO_SHA }}\` |"
            echo "| Upstream Repo | [FreePeak/db-mcp-server](https://github.com/FreePeak/db-mcp-server/commit/${{ env.UPSTREAM_REPO_SHA }}) |"
            echo "| Commit Published | ${{ steps.check-existing.outputs.commit_published }} |"
            echo "| Docker Hub current | ${{ steps.check-existing.outputs.dockerhub_current }} |"
            echo "| GHCR current | ${{ steps.check-existing.outputs.ghcr_current }} |"
            echo "| Versions to Build | ${{ steps.filter-excluded.outputs.versions || steps.determine-versions.outputs.versions || 'None' }} |"
            echo "| Should Build | ${{ steps.filter-excluded.outputs.should_build || steps.determine-versions.outputs.should_build }} |"
            echo "| Excluded Versions | ${{ env.EXCLUDE_VERSIONS || 'None' }} |"
            echo "| Eligible for Stable | ${{ steps.check-stable.outputs.should_mark_stable }} |"
            echo "| Base Image Updated | ${{ steps.check-base-image.outputs.updated }} |"
            echo "| Platforms | ${{ steps.set-platforms.outputs.platforms }} |"
            echo "| Compression | ${{ needs.resolve-profile.outputs.compression_type }} level ${{ needs.resolve-profile.outputs.compression_level }} |"
            echo "| Build Profile | ${{ env.IN_BUILD_PROFILE || 'production' }} |"
            echo "| Custom Tag | ${{ env.IN_CUSTOM_TAG || '(auto-generated)' }} |"
            echo "| Compression Level | ${{ env.IN_COMPRESSION_LEVEL || '22' }} |"
            echo "| Tag as Latest | ${{ env.IN_TAG_AS_LATEST || 'true' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Job 2 — Build per platform
  # Mirrors optimize_builder() + start-docker-build() + execute_with_retry()
  # ============================================================================
  build-platform:
    name: Build ${{ matrix.version }} (${{ matrix.platform_slug }})
    runs-on: ${{ matrix.runner }}
    needs: check-releases
    if: needs.check-releases.outputs.should_build == 'true' && needs.check-releases.outputs.build_matrix != '[]' && needs.check-releases.outputs.build_matrix != ''

    permissions:
      contents: read
      packages: write

    # One build per version+platform — no duplicate concurrent builds
    concurrency:
      group: build-${{ matrix.version }}-${{ matrix.platform_slug }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include: ${{ fromJson(needs.check-releases.outputs.build_matrix || '[]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Clone upstream source ──────────────────────────────────────────────
      # Checkout rule — driven by matrix.version shape, independent of action_type:
      #   • semver "X.Y.Z"      → git tag "v${X.Y.Z}"          (release build)
      #   • "nightly"            → needs.check-releases.outputs.nightly_sha
      #                            (upstream default-branch HEAD at check time)
      #   • "latest-from-source" → env.UPSTREAM_REPO_SHA        (Renovate-pinned)
      #   • anything else        → env.UPSTREAM_REPO_SHA        (defensive fallback)
      # RESOLVED_SHA is the canonical commit the image was actually built from.
      # Downstream steps (labels, VCS_REF, cache-ref) consume the step output,
      # not env.UPSTREAM_REPO_SHA, so per-entry images get correct revisions.
      - name: Clone upstream source
        id: upstream
        # User/upstream-controlled strings pass through env: (bash parses them
        # as ordinary values) instead of GHA template substitution directly
        # into the run: body, which would make shell metachars executable.
        env:
          VERSION: ${{ matrix.version }}
          NIGHTLY_SHA: ${{ needs.check-releases.outputs.nightly_sha }}
          PINNED_SHA: ${{ env.UPSTREAM_REPO_SHA }}
        run: |
          git clone https://github.com/FreePeak/db-mcp-server.git upstream
          cd upstream

          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CHECKOUT_REF="v${VERSION}"
            echo "📌 release build — checking out upstream tag $CHECKOUT_REF"
          elif [[ "$VERSION" == "nightly" ]]; then
            if [[ ! "$NIGHTLY_SHA" =~ ^[0-9a-fA-F]{40}$ ]]; then
              echo "❌ matrix.version=nightly but nightly_sha is not a 40-char hex SHA ('${NIGHTLY_SHA}')" >&2
              exit 1
            fi
            CHECKOUT_REF="$NIGHTLY_SHA"
            echo "🌙 nightly build — checking out HEAD SHA $CHECKOUT_REF"
          else
            CHECKOUT_REF="$PINNED_SHA"
            echo "📌 Renovate-pinned — checking out SHA $CHECKOUT_REF"
          fi

          git checkout "$CHECKOUT_REF"
          RESOLVED_SHA=$(git rev-parse HEAD)
          echo "✅ Checked out upstream @ $CHECKOUT_REF ($RESOLVED_SHA)"

          mkdir -p ./resources
          cp ../resources/entrypoint.sh ../resources/banner.sh ../resources/haproxy.cfg.template ./resources/
          echo "✅ Injected overlay files into upstream build context"

          # Vendor fallback config.json for upstream tags that ship without one
          # (1.0.x–1.3.x). Keeps the runtime-stage `COPY config.json` step
          # working across every release tag without per-version Dockerfile
          # branching. Mirrors the v1.10.0 multi-DB connection sample so the
          # image still boots with sane defaults.
          if [ ! -f config.json ]; then
            cp ../fallback-config.json config.json
            echo "📦 Vendored fallback config.json (upstream $CHECKOUT_REF lacks one)"
          fi

          echo "upstream_sha=$RESOLVED_SHA" >> "$GITHUB_OUTPUT"
          echo "upstream_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"

      # ── Free runner disk space (mirrors docker-build.yml) ─────────────────
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          df -h

      # ── Detect system resources (mirrors detect_system_resources) ──────────
      - name: Detect system resources
        id: resources
        run: |
          CPU=$(nproc)
          MEM_GB=$(awk '/MemTotal/{print int($2/1024/1024)}' /proc/meminfo)
          RL=${{ needs.check-releases.outputs.resource_limit_pct }}

          OPT_CPU=$(( CPU * RL / 100 )); [[ $OPT_CPU -lt 1 ]] && OPT_CPU=1
          OPT_MEM=$(( MEM_GB * RL / 100 )); [[ $OPT_MEM -lt 1 ]] && OPT_MEM=1
          OPT_W=$OPT_CPU

          echo "opt_cpu=$OPT_CPU"     >> "$GITHUB_OUTPUT"
          echo "opt_mem=${OPT_MEM}GB" >> "$GITHUB_OUTPUT"
          echo "opt_workers=$OPT_W"   >> "$GITHUB_OUTPUT"
          echo "System: ${CPU}c / ${MEM_GB}GB → using ${OPT_CPU}c / ${OPT_MEM}GB @ ${RL}%"

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          do_checkout: 'false'
          setup_qemu: 'true'
          setup_buildx: 'true'
          login_dockerhub: 'true'
          login_ghcr: 'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr_actor: ${{ github.actor }}
          ghcr_token: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      # ── Cache warming (mirrors warm_build_cache) ───────────────────────────
      - name: Warm build cache
        continue-on-error: true
        run: |
          for img in golang:1.24-alpine alpine:latest; do
            docker pull "$img" &>/dev/null && echo "✅ $img" || echo "⚠️  $img (skip)"
          done

      # ── Compute primary tag ────────────────────────────────────────────────
      # Uses custom_tag if provided, otherwise auto-generates YYYYMMDD-<sha>
      - name: Compute build tag
        id: build-tag
        env:
          TZ_VAL: ${{ env.TZ }}
          RESOLVED_SHA: ${{ steps.upstream.outputs.upstream_sha }}
          CUSTOM: ${{ env.IN_CUSTOM_TAG }}
          VERSION: ${{ matrix.version }}
        run: |
          DATE=$(TZ="$TZ_VAL" date +"%Y%m%d")
          SHORT_SHA="${RESOLVED_SHA:0:7}"
          AUTO_TAG="${DATE}-${SHORT_SHA}"

          # Primary tag precedence:
          #   1. custom_tag input (explicit override) — always wins
          #   2. semver matrix entry (release build) — use version as primary
          #   3. nightly sentinel — "nightly-YYYYMMDD-<short>" immutable tag
          #   4. Renovate/fallback — DATE-SHA auto tag
          if [[ -n "$CUSTOM" ]]; then
            PRIMARY="$CUSTOM"
            echo "🏷️  Using custom tag: $PRIMARY"
          elif [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            PRIMARY="$VERSION"
            echo "🏷️  Release primary tag: $PRIMARY (auto: $AUTO_TAG)"
          elif [[ "$VERSION" == "nightly" ]]; then
            PRIMARY="nightly-${DATE}-${SHORT_SHA}"
            echo "🌙 Nightly primary tag: $PRIMARY"
          else
            PRIMARY="$AUTO_TAG"
            echo "🏷️  Using auto-generated tag: $PRIMARY"
          fi

          echo "primary=$PRIMARY"     >> "$GITHUB_OUTPUT"
          echo "auto_tag=$AUTO_TAG"   >> "$GITHUB_OUTPUT"
          echo "date=$DATE"           >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "is_custom=$([[ -n "$CUSTOM" ]] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      # ── Docker metadata ────────────────────────────────────────────────────
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ${{ env.DOCKERHUB_REPO }}
            ${{ env.GHCR_REPO }}
          tags: |
            # Primary tag: custom if set, otherwise YYYYMMDD-<short-sha>
            type=raw,value=${{ steps.build-tag.outputs.primary }}
            # Auto-generated tag always applied (even when custom_tag is set)
            type=raw,value=${{ steps.build-tag.outputs.auto_tag }},enable=${{ steps.build-tag.outputs.is_custom == 'false' }}
            # Floating date-only tag: YYYYMMDD
            type=raw,value=${{ steps.build-tag.outputs.date }}
            # Floating :latest — controlled by tag_as_latest checkbox
            type=raw,value=latest,enable=${{ env.IN_TAG_AS_LATEST != 'false' && github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=db-mcp-server
            org.opencontainers.image.description=Multi-database MCP server for AI assistants
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ steps.build-tag.outputs.primary }}
            org.opencontainers.image.version.auto=${{ steps.build-tag.outputs.auto_tag }}
            org.opencontainers.image.created=${{ steps.build-tag.outputs.date }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.upstream.repo=https://github.com/FreePeak/db-mcp-server
            org.opencontainers.image.upstream.revision=${{ steps.upstream.outputs.upstream_sha }}
            org.opencontainers.image.upstream.ref=${{ steps.upstream.outputs.upstream_ref }}
            org.opencontainers.image.documentation=https://github.com/FreePeak/db-mcp-server
            org.opencontainers.image.revision=${{ steps.upstream.outputs.upstream_sha }}
            org.opencontainers.image.base.digest=${{ needs.check-releases.outputs.base_combined_digest }}

      # ── Platform-scoped cache ref ──────────────────────────────────────────
      - name: Determine cache ref
        id: cache-ref
        run: |
          case "${{ matrix.platform }}" in
            linux/amd64)   TAG=buildcache-amd64  ;;
            linux/arm64)   TAG=buildcache-arm64  ;;
            linux/arm/v7)  TAG=buildcache-armv7  ;;
            *)             TAG=buildcache-${{ matrix.platform_slug }} ;;
          esac
          echo "cache_tag=$TAG" >> "$GITHUB_OUTPUT"

      # ── Build start monitoring ─────────────────────────────────────────────
      - name: Start build monitoring
        id: monitor
        run: |
          echo "start_epoch=$(date +%s)" >> "$GITHUB_OUTPUT"
          echo "Build started at $(date -u)"
          echo "Profile:     ${{ env.IN_BUILD_PROFILE || 'production' }}"
          echo "Compression: ${{ needs.check-releases.outputs.compression_params }}"
          echo "Platform:    ${{ matrix.platform }}"
          echo "Version:     ${{ matrix.version }}"
          echo "Timeout:     ${{ needs.check-releases.outputs.build_timeout_min }}min"

      # ── Generate Dockerfile via DockerfileModifier.sh ─────────────────────
      # check-releases already probed each base image once and published the
      # chosen ref (GHCR mirror if reachable, else Docker Hub fallback).
      # This step writes those refs into build_data/, then runs the Modifier
      # to produce Dockerfile.db-mcp-server from the committed template.
      # Replaces the prior sed-swap-on-committed-Dockerfile approach so the
      # image refs flow through the same mechanism all sibling MCP repos use.
      # Fallback chain per ref:
      #   1. base_ref_* output from check-releases (GHCR-or-DH)
      #   2. hardcoded DH short-ref here (if check-releases output empty)
      #   3. Modifier-level default (if build_data file missing entirely)
      - name: Generate Dockerfile
        id: gen-dockerfile
        env:
          HAPROXY_REF:    ${{ needs.check-releases.outputs.base_ref_haproxy }}
          BUILDER_REF:    ${{ needs.check-releases.outputs.base_ref_builder }}
          RUNTIME_REF:    ${{ needs.check-releases.outputs.base_ref_runtime }}
          XX_REF:         ${{ needs.check-releases.outputs.base_ref_xx }}
          MATRIX_VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          mkdir -p build_data
          echo "${BUILDER_REF:-golang:alpine}"       > build_data/base-image
          echo "${HAPROXY_REF:-haproxy:lts-alpine}"  > build_data/haproxy-image
          echo "${RUNTIME_REF:-alpine:latest}"       > build_data/runtime-image
          echo "${XX_REF:-tonistiigi/xx:1.9.0}"      > build_data/xx-image
          echo "${MATRIX_VERSION}"                   > build_data/version

          echo "─── build_data ────────────────────────────────────"
          for f in build_data/base-image build_data/haproxy-image \
                   build_data/runtime-image build_data/xx-image \
                   build_data/version; do
            printf "  %-30s %s\n" "$f" "$(cat "$f")"
          done

          bash ./DockerfileModifier.sh

          echo "─── Final FROM lines ──────────────────────────────"
          grep -nE "^FROM" ./Dockerfile.db-mcp-server
          echo "───────────────────────────────────────────────────"

      # ── Get base image digest for change-tracking label ───────────────────
      # Target the runtime stage (final FROM line), not the first FROM —
      # first FROM is the xx cross-compile helper, whose digest isn't what
      # runtime security scans and base-digest tracking should track.
      # MUST run AFTER `base-images` so the inspected ref matches whatever
      # the build will actually pull (incl. GHCR mirror swaps).
      - name: Get base image digest
        id: base-digest
        run: |
          # Ignore FROM lines that reference other build stages by alias
          # (`FROM builder`, `FROM haproxy-src`) — we only want real images.
          BASE=$(awk '
            /^FROM / {
              img=$2
              if (img ~ /^--platform/) img=$3
              if (img ~ /[:\/]/) last=img
            }
            END { print last }' Dockerfile.db-mcp-server)
          DIG=$(skopeo inspect "docker://${BASE}" 2>/dev/null | jq -r '.Digest' || echo "unknown")
          echo "digest=$DIG"   >> "$GITHUB_OUTPUT"
          echo "image=$BASE"   >> "$GITHUB_OUTPUT"
          echo "Base (runtime): $BASE @ $DIG"


      # ── Build (with timeout acting as execute_with_retry wrapper) ──────────
      - name: Build and push by digest
        id: build
        uses: ./.github/actions/build-push-retry
        timeout-minutes: ${{ fromJSON(needs.check-releases.outputs.build_timeout_min || '60') }}
        with:
          context: ./upstream
          file: ./Dockerfile.db-mcp-server
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          # Pull latest base layer on every build (security + freshness)
          pull: true
          # Full provenance + SBOM for supply-chain transparency
          provenance: mode=max
          sbom: true
          # Allow network during build (needed for binary downloads)
          allow: network.host
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            BUILDKIT_MULTI_PLATFORM=1
            BUILDKIT_MAX_PARALLELISM=${{ steps.resources.outputs.opt_cpu }}
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ steps.upstream.outputs.upstream_sha }}
            BASE_IMAGE_DIGEST=${{ steps.base-digest.outputs.digest }}
          # GHA cache primary + GHCR registry cache fallback (zstd compression)
          cache-from: |
            type=gha,scope=build-${{ matrix.version }}-${{ matrix.platform_slug }}
            type=registry,ref=${{ env.GHCR_REPO }}:${{ steps.cache-ref.outputs.cache_tag }}
          cache-to: |
            type=gha,scope=build-${{ matrix.version }}-${{ matrix.platform_slug }},mode=max,compression=zstd,compression-level=${{ needs.check-releases.outputs.compression_level }}
            type=registry,ref=${{ env.GHCR_REPO }}:${{ steps.cache-ref.outputs.cache_tag }},mode=max,compression=zstd,compression-level=${{ needs.check-releases.outputs.compression_level }},image-manifest=true,oci-mediatypes=true
          # Push by digest — tags applied in merge-manifest job.
          outputs: >-
            ${{
              format('type=image,name={0},push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true,{1},export-cache-concurrency={2},export-layers-concurrency={3}',
                    (env.IN_PUSH_TO_GHCR != 'false' && env.GHCR_REPO || env.DOCKERHUB_REPO),
                    needs.check-releases.outputs.compression_params,
                    env.EXPORT_CACHE_CONCURRENCY,
                    env.EXPORT_LAYERS_CONCURRENCY)
            }}

      # ── Build end monitoring + summary ────────────────────────────────────
      - name: Build performance summary
        if: always()
        run: |
          START=${{ steps.monitor.outputs.start_epoch }}
          DURATION=$(( $(date +%s) - START ))
          HH=$((DURATION/3600)); MM=$(( (DURATION%3600)/60 )); SS=$((DURATION%60))

          echo "📊 ======== BUILD SUMMARY ========"
          echo "🏷️  Version:    ${{ matrix.version }}"
          echo "🖥️  Platform:   ${{ matrix.platform }}"
          echo "⏱️  Duration:   ${HH}h ${MM}m ${SS}s"
          echo "🗜️  Compression: ${{ needs.check-releases.outputs.compression_params }}"
          echo "💻 Resources:  ${{ steps.resources.outputs.opt_cpu }}c / ${{ steps.resources.outputs.opt_mem }}"
          echo "================================="

          {
            echo "## 🔧 Platform Build: ${{ steps.build-tag.outputs.primary }} (${{ matrix.platform }})"
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Primary Tag | \`${{ steps.build-tag.outputs.primary }}\` |"
            echo "| Date | ${{ steps.build-tag.outputs.date }} |"
            echo "| Short SHA | ${{ steps.build-tag.outputs.short_sha }} |"
            echo "| Platform | ${{ matrix.platform }} |"
            echo "| Duration | ${HH}h ${MM}m ${SS}s |"
            echo "| Digest | \`${{ steps.build.outputs.digest }}\` |"
            echo "| Image ID | ${{ steps.build.outputs.imageid }} |"
            echo "| Base Image | ${{ steps.base-digest.outputs.image }} |"
            echo "| Compression | ${{ needs.check-releases.outputs.compression_params }} |"
            echo "| CPU/RAM | ${{ steps.resources.outputs.opt_cpu }} / ${{ steps.resources.outputs.opt_mem }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Save digest ────────────────────────────────────────────────────────
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          DIGEST="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.version }}-${{ matrix.platform_slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ============================================================================
  # Job 3 — Merge per-platform digests into multi-arch manifests, per version
  # ============================================================================
  merge-manifest:
    name: Merge Manifest ${{ matrix.version }}
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    # Per-version gate: proceed whenever check-releases succeeded and at least
    # one platform produced a digest for THIS version. Avoids killing good
    # versions because an unrelated version's arm64 build flaked. The
    # download-digests step has continue-on-error, so missing-artifacts land
    # in check-digests → has_digests=false, and every downstream step is
    # already guarded on has_digests. fail-fast: false on the matrix below
    # prevents one version's failure from cancelling siblings.
    if: ${{ !cancelled() && needs.check-releases.result == 'success' && needs.build-platform.result != 'cancelled' }}
    needs: [check-releases, build-platform]

    permissions:
      contents: read
      packages: write

    outputs:
      primary_tag: ${{ steps.tags.outputs.primary_tag }}
      date_tag:    ${{ steps.tags.outputs.date_tag }}

    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.check-releases.outputs.versions_json || '[]') }}

    steps:
      - name: Download all platform digests for this version
        id: download-digests
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.version }}-*
          merge-multiple: true

      - name: Check if merge is needed
        id: check-digests
        shell: bash
        run: |
          if [[ -d /tmp/digests ]] && ls /tmp/digests/* >/dev/null 2>&1; then
            echo "has_digests=true" >> "$GITHUB_OUTPUT"
            echo "Found digests to merge:"
            ls -la /tmp/digests/
          else
            echo "has_digests=false" >> "$GITHUB_OUTPUT"
            echo "No digests found — all builds were skipped (tags already exist)"
          fi

      - name: Checkout
        if: steps.check-digests.outputs.has_digests == 'true'
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup build environment
        if: steps.check-digests.outputs.has_digests == 'true'
        uses: ./.github/actions/setup-build-env
        with:
          do_checkout: 'false'
          setup_qemu: 'false'
          setup_buildx: 'false'
          login_dockerhub: 'true'
          login_ghcr: 'true'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr_actor: ${{ github.actor }}
          ghcr_token: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        if: steps.check-digests.outputs.has_digests == 'true'
        id: tags
        env:
          TZ_VAL: ${{ env.TZ }}
          VERSION: ${{ matrix.version }}
          CUSTOM: ${{ env.IN_CUSTOM_TAG }}
          TAG_AS_LATEST: ${{ env.IN_TAG_AS_LATEST || 'true' }}
          VERSIONS_JSON: ${{ needs.check-releases.outputs.versions_json }}
          NIGHTLY_SHA_IN: ${{ needs.check-releases.outputs.nightly_sha }}
          NIGHTLY_SHORT_IN: ${{ needs.check-releases.outputs.nightly_short_sha }}
          PINNED_SHA: ${{ env.UPSTREAM_REPO_SHA }}
        run: |
          DATE=$(TZ="$TZ_VAL" date +"%Y%m%d")

          # Entry type is driven by matrix.version shape, not action_type.
          IS_RELEASE_BUILD="false"
          IS_NIGHTLY="false"
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IS_RELEASE_BUILD="true"
          elif [[ "$VERSION" == "nightly" ]]; then
            IS_NIGHTLY="true"
          fi

          # Resolve upstream commit SHA for this image:
          # • Release → /git/refs/tags/v${VERSION} on FreePeak/db-mcp-server
          # • Nightly → needs.check-releases.outputs.nightly_sha
          # • Fallback → env.UPSTREAM_REPO_SHA
          # merge-manifest does not clone, so release-mode SHA is fetched fresh.
          if [[ "$IS_RELEASE_BUILD" == "true" ]]; then
            # gh api resolves tag → commit transparently via /commits/{ref},
            # so annotated tags return the dereferenced commit SHA (not the
            # tag-object SHA that /git/refs/tags/* would yield).
            RESOLVED_SHA=""
            for attempt in 1 2 3; do
              RESOLVED_SHA=$(GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" gh api \
                "repos/FreePeak/db-mcp-server/commits/v${VERSION}" \
                --jq .sha 2>/dev/null || echo "")
              [[ -n "$RESOLVED_SHA" ]] && break
              [[ $attempt -lt 3 ]] && sleep $(( attempt * 10 ))
            done
            if [[ -z "$RESOLVED_SHA" ]]; then
              echo "::error::Could not resolve commit SHA for v${VERSION} after 3 attempts"
              exit 1
            fi
          elif [[ "$IS_NIGHTLY" == "true" ]]; then
            RESOLVED_SHA="$NIGHTLY_SHA_IN"
          else
            RESOLVED_SHA="$PINNED_SHA"
          fi
          SHORT_SHA="${RESOLVED_SHA:0:7}"
          AUTO_TAG="${DATE}-${SHORT_SHA}"

          # Primary tag precedence:
          #   1. custom_tag input — explicit user override
          #   2. release → matrix.version (e.g. "1.9.0")
          #   3. nightly → "nightly-YYYYMMDD-<short>"
          #   4. fallback → DATE-SHA
          if [[ -n "$CUSTOM" ]]; then
            PRIMARY="$CUSTOM"
            echo "🏷️  Custom tag: $PRIMARY"
          elif [[ "$IS_RELEASE_BUILD" == "true" ]]; then
            PRIMARY="$VERSION"
            echo "🏷️  Release tag: $PRIMARY"
          elif [[ "$IS_NIGHTLY" == "true" ]]; then
            NSHORT="${NIGHTLY_SHORT_IN:-$SHORT_SHA}"
            PRIMARY="nightly-${DATE}-${NSHORT}"
            echo "🌙 Nightly tag: $PRIMARY"
          else
            PRIMARY="$AUTO_TAG"
            echo "🏷️  Auto tag: $PRIMARY"
          fi

          DH_TAGS="-t ${{ env.DOCKERHUB_REPO }}:${PRIMARY}"
          GC_TAGS="-t ${{ env.GHCR_REPO }}:${PRIMARY}"

          # Nightly floats :nightly and nothing else.
          if [[ "$IS_NIGHTLY" == "true" ]]; then
            DH_TAGS="$DH_TAGS -t ${{ env.DOCKERHUB_REPO }}:nightly"
            GC_TAGS="$GC_TAGS -t ${{ env.GHCR_REPO }}:nightly"
          fi

          # :DATE and :DATE-SHA floats are only applied in non-release / non-nightly
          # fallback mode — they would collide across heterogeneous matrix runs.
          if [[ "$IS_RELEASE_BUILD" != "true" && "$IS_NIGHTLY" != "true" ]]; then
            DH_TAGS="$DH_TAGS -t ${{ env.DOCKERHUB_REPO }}:${DATE}"
            GC_TAGS="$GC_TAGS -t ${{ env.GHCR_REPO }}:${DATE}"
            if [[ -n "$CUSTOM" ]]; then
              DH_TAGS="$DH_TAGS -t ${{ env.DOCKERHUB_REPO }}:${AUTO_TAG}"
              GC_TAGS="$GC_TAGS -t ${{ env.GHCR_REPO }}:${AUTO_TAG}"
            fi
          fi

          # :latest rules:
          #   • Nightly → never
          #   • Release → only the highest semver in versions_json
          #   • Fallback/Renovate → existing behavior (checkbox-gated), but
          #     suppressed when any semver release is also in the matrix
          #     (release takes precedence over Renovate-pinned SHA as :latest).
          APPLY_LATEST="false"
          if [[ "$TAG_AS_LATEST" == "true" && "$IS_NIGHTLY" != "true" ]]; then
            SEMVERS=$(echo "$VERSIONS_JSON" | jq -r '.[] | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))' | sort -V)
            HIGHEST_SEMVER=$(echo "$SEMVERS" | tail -1)
            if [[ "$IS_RELEASE_BUILD" == "true" ]]; then
              if [[ "$VERSION" == "$HIGHEST_SEMVER" ]]; then
                APPLY_LATEST="true"
                echo "🏷️  $VERSION is highest semver in matrix — applying :latest"
              else
                echo "⏭️  $VERSION < $HIGHEST_SEMVER — skipping :latest"
              fi
            else
              # Fallback entry. Only take :latest if no semver release in matrix.
              if [[ -z "$HIGHEST_SEMVER" ]]; then
                APPLY_LATEST="true"
                echo "🏷️  No semver in matrix — fallback entry takes :latest"
              else
                echo "⏭️  Semver release in matrix ($HIGHEST_SEMVER) — fallback skips :latest"
              fi
            fi
          fi
          if [[ "$APPLY_LATEST" == "true" ]]; then
            DH_TAGS="$DH_TAGS -t ${{ env.DOCKERHUB_REPO }}:latest"
            GC_TAGS="$GC_TAGS -t ${{ env.GHCR_REPO }}:latest"
          fi

          echo "dockerhub_tags=$DH_TAGS"  >> "$GITHUB_OUTPUT"
          echo "ghcr_tags=$GC_TAGS"       >> "$GITHUB_OUTPUT"
          echo "primary_tag=$PRIMARY"     >> "$GITHUB_OUTPUT"
          echo "auto_tag=$AUTO_TAG"       >> "$GITHUB_OUTPUT"
          echo "date_tag=$DATE"           >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA"     >> "$GITHUB_OUTPUT"
          echo "upstream_sha=$RESOLVED_SHA" >> "$GITHUB_OUTPUT"
          echo "is_nightly=$IS_NIGHTLY"   >> "$GITHUB_OUTPUT"
          echo "DH: $DH_TAGS"
          echo "GC: $GC_TAGS"

      # ── Docker Hub manifest (with retry — mirrors merge job in docker-build.yml) ──
      - name: Create Docker Hub multi-arch manifest
        id: dockerhub-manifest
        if: steps.check-digests.outputs.has_digests == 'true' && env.IN_PUSH_TO_DOCKERHUB != 'false'
        run: |
          SOURCE_REPO="${{ env.GHCR_REPO }}"
          if [[ "${{ env.IN_PUSH_TO_GHCR || 'true' }}" != "true" ]]; then
            SOURCE_REPO="${{ env.DOCKERHUB_REPO }}"
          fi
          SOURCES=$(for f in /tmp/digests/*; do [[ -f "$f" ]] || continue; echo "${SOURCE_REPO}@sha256:$(basename $f)"; done | tr '\n' ' ')
          SUCCESS=0
          RATE_LIMITED=0

          for attempt in 1 2 3; do
            echo "Attempt $attempt/3..."
            OUTPUT=$(docker buildx imagetools create ${{ steps.tags.outputs.dockerhub_tags }} $SOURCES 2>&1) && {
              echo "$OUTPUT"
              SUCCESS=1
              break
            }

            echo "$OUTPUT"
            # Longer backoff on 429 to actually let the bucket refill; short
            # backoff on other transient failures.
            if echo "$OUTPUT" | grep -Eiq 'toomanyrequests|429 Too Many Requests'; then
              RATE_LIMITED=1
              SLEEP=$(( attempt * 60 ))
            else
              SLEEP=$(( attempt * 10 ))
            fi

            [[ $attempt -lt 3 ]] && { echo "Retrying in ${SLEEP}s..."; sleep "$SLEEP"; }
          done

          if [[ $SUCCESS -eq 1 ]]; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          elif [[ $RATE_LIMITED -eq 1 ]]; then
            echo "status=rate-limited" >> "$GITHUB_OUTPUT"
            echo "::warning::Docker Hub rate-limited during manifest publish; continuing with GHCR as source of truth for this run."
          else
            echo "status=failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      # ── GHCR manifest (with retry) ─────────────────────────────────────────
      - name: Create GHCR multi-arch manifest
        if: steps.check-digests.outputs.has_digests == 'true' && env.IN_PUSH_TO_GHCR != 'false'
        run: |
          SOURCES=$(for f in /tmp/digests/*; do [[ -f "$f" ]] || continue; echo "${{ env.GHCR_REPO }}@sha256:$(basename $f)"; done | tr '\n' ' ')
          for attempt in 1 2 3; do
            echo "Attempt $attempt/3..."
            OUTPUT=$(docker buildx imagetools create ${{ steps.tags.outputs.ghcr_tags }} $SOURCES 2>&1) && { echo "$OUTPUT"; break; }
            echo "$OUTPUT"
            # GHCR has higher rate limits but can still 429 under heavy matrix
            # load; use longer backoff when the server tells us to slow down.
            if echo "$OUTPUT" | grep -Eiq 'toomanyrequests|429 Too Many Requests'; then
              SLEEP=$(( attempt * 60 ))
            else
              SLEEP=$(( attempt * 15 ))
            fi
            if [[ $attempt -lt 3 ]]; then
              echo "Retrying in ${SLEEP}s..."; sleep "$SLEEP"
            else
              exit 1
            fi
          done

      - name: Inspect final manifest
        if: steps.check-digests.outputs.has_digests == 'true'
        run: |
          # Always inspect on GHCR. GHCR has no pull-rate limits for
          # authenticated callers; Docker Hub's 200/6h anon (5000/6h auth)
          # window is trivially blown on large matrix builds and produces
          # 429 "toomanyrequests" on what is only a verification step.
          # The manifests are identical across both registries post-push.
          docker buildx imagetools inspect ${{ env.GHCR_REPO }}:${{ steps.tags.outputs.primary_tag }}

      # ── Trivy security scan (non-blocking) ────────────────────────────────
      - name: Trivy vulnerability scan
        id: trivy-scan
        if: steps.check-digests.outputs.has_digests == 'true' && env.IN_RUN_SECURITY_SCAN != 'false'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.GHCR_REPO }}:${{ steps.tags.outputs.primary_tag }}'
          format: sarif
          output: 'trivy-${{ matrix.version }}.sarif'
          severity: 'CRITICAL,HIGH'
          timeout: '10m'
        continue-on-error: true

      - name: Upload Trivy SARIF results
        # Only upload if scan actually produced a file — skips when Trivy install fails
        if: >
          steps.check-digests.outputs.has_digests == 'true' &&
          env.IN_RUN_SECURITY_SCAN != 'false' &&
          steps.trivy-scan.outcome == 'success' &&
          hashFiles(format('trivy-{0}.sarif', matrix.version)) != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-${{ matrix.version }}.sarif'
          category:   'trivy-${{ steps.tags.outputs.primary_tag }}'
        continue-on-error: true

      - name: Merge summary
        if: steps.check-digests.outputs.has_digests == 'true'
        run: |
          {
            echo "## ✅ Build Complete: ${{ steps.tags.outputs.primary_tag }}"
            echo "| Property | Value |"
            echo "|---|---|"
            echo "| Primary Tag | \`${{ steps.tags.outputs.primary_tag }}\` |"
            echo "| Date Tag | ${{ steps.tags.outputs.date_tag }} |"
            echo "| Short SHA | ${{ steps.tags.outputs.short_sha }} |"
            echo "| Upstream Commit | ${{ steps.tags.outputs.upstream_sha || env.UPSTREAM_REPO_SHA }} |"
            echo "| Compression | ${{ needs.check-releases.outputs.compression_params }} |"
            echo "| Platforms | ${{ needs.check-releases.outputs.platforms }} |"
            echo ""
            echo "### Tags Applied"
            echo '```'
            echo "${{ steps.tags.outputs.dockerhub_tags }} ${{ steps.tags.outputs.ghcr_tags }}" \
              | tr ' ' '\n' | grep -v '^-t$' | grep -v '^$'
            echo '```'
            echo ""
            echo "### Platform Digests"
            for f in /tmp/digests/*; do echo "- \`sha256:$(basename $f)\`"; done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build artifacts
        if: steps.check-digests.outputs.has_digests == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: build-info-${{ matrix.version }}
          path: trivy-${{ matrix.version }}.sarif
          retention-days: 30
          if-no-files-found: ignore

  # ============================================================================
  # Job 3.5 — Post-build MCP smoke test (per version)
  # ----------------------------------------------------------------------------
  # Boots a fresh PostgreSQL+TimescaleDB service container, pulls the just-
  # published GHCR image for THIS matrix version, and runs the full MCP
  # `tools/call` battery defined in .github/smoke/run-smoke.sh.
  #
  # Failure here STOPS sync-registries (and therefore the Docker Hub mirror)
  # so a broken image cannot escape. amd64-only — same Go binary as arm64/v7
  # cross-builds, so formatter/transport regressions surface here regardless
  # of platform. Catches:
  #   - Upstream FormatResponse double-wrap regressions (PR #67 guard)
  #   - Broken supergateway link, HAProxy mis-routing, busted entrypoint
  #   - MCP transport / handshake / tool-family drift
  # ============================================================================
  smoke-test:
    name: Smoke Test ${{ matrix.version }}
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    needs: [check-releases, merge-manifest]
    if: ${{ !cancelled() && needs.merge-manifest.result == 'success' }}

    permissions:
      contents: read
      packages: read

    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJson(needs.check-releases.outputs.versions_json || '[]') }}

    services:
      postgres:
        image: timescale/timescaledb-ha:pg18
        env:
          POSTGRES_USER:     dbmcp
          POSTGRES_PASSWORD: smokepass
          POSTGRES_DB:       smoke_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dbmcp -d smoke_db"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install client tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client jq curl

      - name: Login to GHCR (read-only)
        uses: ./.github/actions/registry-login
        with:
          ghcr_actor:         ${{ github.actor }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
          push_to_dockerhub:  'false'
          push_to_ghcr:       'true'

      - name: Run MCP smoke battery
        env:
          IMAGE_REF: ${{ env.GHCR_REPO }}:${{ matrix.version }}
          PG_HOST:   localhost
          PG_PORT:   '5432'
          PG_USER:   dbmcp
          PG_PASS:   smokepass
          PG_DB:     smoke_db
          MCP_PORT:  '39092'
        run: |
          chmod +x .github/smoke/run-smoke.sh
          bash .github/smoke/run-smoke.sh "$IMAGE_REF"

      - name: Container logs on failure
        if: failure()
        run: |
          {
            echo "## ❌ Smoke failed: ${{ matrix.version }}"
            echo
            echo "### Container logs"
            echo '```'
            docker logs dbmcp-smoke 2>&1 | tail -200 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summary on success
        if: success()
        run: |
          {
            echo "## ✅ Smoke passed: ${{ matrix.version }}"
            echo
            echo "Image: \`${{ env.GHCR_REPO }}:${{ matrix.version }}\`"
            echo "Postgres: \`timescale/timescaledb-ha:pg18\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Job 4 — Registry sync (bidirectional DH ↔ GHCR via skopeo)
  # ----------------------------------------------------------------------------
  # Gated on smoke-test passing for every version. The sync-registries
  # dispatch path (action_type == 'sync-registries') bypasses smoke because
  # it mirrors pre-existing GHCR images that were already smoked at build
  # time.
  # ============================================================================
  sync-registries:
    name: Sync Registries
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    needs: [check-releases, merge-manifest, smoke-test]
    if: |
      always() &&
      (needs.check-releases.outputs.action_type == 'sync-registries' ||
       (needs.merge-manifest.result == 'success' &&
        needs.smoke-test.result == 'success'))

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install skopeo
        run: sudo apt-get update -qq && sudo apt-get install -y skopeo

      - name: Login to registries
        uses: ./.github/actions/registry-login
        with:
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr_actor:         ${{ github.actor }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Sync images
        uses: ./.github/actions/registry-sync
        with:
          dockerhub_repo: ${{ env.DOCKERHUB_REPO }}
          ghcr_repo:      ${{ env.GHCR_REPO }}
          tags: latest,stable,${{ needs.merge-manifest.outputs.primary_tag }},${{ needs.merge-manifest.outputs.date_tag }}

  # ============================================================================
  # Job 5 — Image promotion (version → latest/stable)
  # ============================================================================
  promote-image:
    name: Promote Image
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    needs: check-releases
    if: needs.check-releases.outputs.action_type == 'promote-image'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Validate inputs
        run: |
          [[ -z "${{ env.IN_PROMOTE_VERSION }}" ]] \
            && { echo "::error::promote_version is required"; exit 1; }

      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install skopeo
        run: sudo apt-get update -qq && sudo apt-get install -y skopeo

      - name: Login to registries
        uses: ./.github/actions/registry-login
        with:
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr_actor:         ${{ github.actor }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Promote image
        run: |
          SRC="${{ env.IN_PROMOTE_VERSION }}"
          TGT="${{ env.IN_PROMOTE_TAG }}"

          # Rate-limit tolerant skopeo copy
          skopeo_copy_rl() {
            local src="$1" dst="$2" attempt
            for attempt in 1 2 3; do
              echo "  [attempt $attempt/3] $src → $dst"
              if skopeo copy --all "docker://${src}" "docker://${dst}" 2>/tmp/rl_err; then
                return 0
              fi
              if grep -qiE '429|toomanyrequests|rate limit' /tmp/rl_err; then
                sleep $(( attempt * 30 ))
              else
                sleep $(( attempt * 10 ))
              fi
            done
            return 1
          }

          skopeo inspect "docker://${{ env.GHCR_REPO }}:${SRC}" > /dev/null 2>&1 \
            || { echo "::error::Source $SRC not found in GHCR"; exit 1; }

          echo "Promoting $SRC → $TGT on Docker Hub..."
          skopeo_copy_rl "${{ env.DOCKERHUB_REPO }}:${SRC}" "${{ env.DOCKERHUB_REPO }}:${TGT}"

          echo "Promoting $SRC → $TGT on GHCR..."
          skopeo_copy_rl "${{ env.GHCR_REPO }}:${SRC}" "${{ env.GHCR_REPO }}:${TGT}"

          {
            echo "## Image Promotion"
            echo "| Source | Target | Status |"
            echo "|---|---|---|"
            echo "| $SRC | $TGT | ✅ Success |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Job 6 — Mark stable (5-day rule with digest deduplication)
  # ============================================================================
  mark-stable:
    name: Mark Stable
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    needs: [check-releases, merge-manifest, sync-registries]
    # Promote only when upstream jobs didn't fail. For manual mark-stable, merge
    # and sync may be skipped (no-build path) — treat `skipped` as acceptable.
    if: |
      always() &&
      needs.merge-manifest.result   != 'failure' &&
      needs.merge-manifest.result   != 'cancelled' &&
      needs.sync-registries.result  != 'failure' &&
      needs.sync-registries.result  != 'cancelled' &&
      (needs.check-releases.outputs.action_type == 'mark-stable' ||
       (needs.check-releases.outputs.action_type == 'auto-check' &&
        needs.check-releases.outputs.should_mark_stable == 'true'))

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install skopeo
        run: sudo apt-get update -qq && sudo apt-get install -y skopeo jq

      - name: Login to registries
        uses: ./.github/actions/registry-login
        with:
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token:    ${{ secrets.DOCKERHUB_TOKEN }}
          ghcr_actor:         ${{ github.actor }}
          ghcr_token:         ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Check and promote to stable
        timeout-minutes: 15
        run: |
          STABLE_VERSION="${{ needs.check-releases.outputs.stable_version }}"

          # Manual mark-stable fallback: verify 5-day rule from pipeline-state
          if [[ -z "$STABLE_VERSION" ]]; then
            # Read latest_sha_since from pipeline-state to verify 5-day rule
            LATEST_SHA_SINCE=""
            if git fetch origin pipeline-state --depth=1 2>/dev/null; then
              LATEST_SHA_SINCE=$(git show origin/pipeline-state:latest-sha-since 2>/dev/null || echo "")
            fi

            if [[ -n "$LATEST_SHA_SINCE" ]]; then
              SINCE_EPOCH=$(date -d "$LATEST_SHA_SINCE" +%s 2>/dev/null || echo "0")
              NOW=$(date +%s)
              FIVE_DAYS=$(( 5 * 24 * 3600 ))
              DAYS_AS_LATEST=$(( (NOW - SINCE_EPOCH) / 86400 ))

              if [[ $SINCE_EPOCH -gt 0 && $(( NOW - SINCE_EPOCH )) -ge $FIVE_DAYS ]]; then
                STABLE_VERSION=$(skopeo inspect "docker://${{ env.GHCR_REPO }}:latest" 2>/dev/null \
                  | jq -r '.Labels["org.opencontainers.image.version"] // empty' || echo "")
                echo "Manual mark-stable: version $STABLE_VERSION has been :latest for $DAYS_AS_LATEST days — eligible"
              else
                echo "Manual mark-stable: :latest has only been active for $DAYS_AS_LATEST days (< 5 required) — skipping"
                exit 0
              fi
            else
              echo "No pipeline-state tracking data found — cannot verify 5-day rule"
              exit 0
            fi
          fi

          [[ -z "$STABLE_VERSION" ]] && { echo "No version eligible for stable"; exit 0; }

          # Use GHCR as source of truth for digest comparison (no rate limits)
          TARGET=$(skopeo inspect "docker://${{ env.GHCR_REPO }}:${STABLE_VERSION}" 2>/dev/null \
            | jq -r '.Digest' || echo "none")

          if [[ "$TARGET" == "none" ]]; then
            echo "Version $STABLE_VERSION not found in GHCR — skipping"
            exit 0
          fi

          # Check GHCR :stable digest — authoritative source.
          # Docker Hub is not inspected here (rate limits); the downstream
          # skopeo_copy_rl step will push to Docker Hub regardless. If GHCR
          # already points at $TARGET, Docker Hub will be synced by the copy
          # step in a follow-up run, or via the existing registry-sync path.
          GHCR_STABLE=$(skopeo inspect "docker://${{ env.GHCR_REPO }}:stable" 2>/dev/null \
            | jq -r '.Digest' || echo "none")

          # Docker Hub :stable digest — needed to decide whether to sync DH
          # from GHCR below. Missing tag (first run) -> "none" forces a sync.
          DH_STABLE=$(skopeo inspect "docker://${{ env.DOCKERHUB_REPO }}:stable" 2>/dev/null \
            | jq -r '.Digest' || echo "none")

          if [[ "$GHCR_STABLE" == "$TARGET" && "$DH_STABLE" == "$TARGET" ]]; then
            echo "stable already points to $STABLE_VERSION on both GHCR and Docker Hub — nothing to do"
            exit 0
          fi

          # Rate-limit tolerant skopeo copy with longer backoff
          skopeo_copy_rl() {
            local src="$1" dst="$2" attempts=5 attempt
            for attempt in $(seq 1 "$attempts"); do
              echo "  [attempt $attempt/$attempts] $src → $dst"
              if skopeo copy --all --retry-times 2 "docker://${src}" "docker://${dst}" 2>/tmp/rl_err; then
                return 0
              fi
              if grep -qiE '429|toomanyrequests|rate limit' /tmp/rl_err; then
                echo "  Rate limited — backing off $(( attempt * 60 ))s"
                sleep $(( attempt * 60 ))
              elif [[ "$attempt" -lt "$attempts" ]]; then
                echo "  Copy failed — retrying in $(( attempt * 15 ))s"
                cat /tmp/rl_err >&2
                sleep $(( attempt * 15 ))
              fi
            done
            echo "::error::skopeo copy failed after $attempts attempts: $src → $dst"
            cat /tmp/rl_err >&2
            return 1
          }

          echo "Marking $STABLE_VERSION as stable..."

          # Promote GHCR stable first (GHCR → GHCR, no rate limits)
          if [[ "$GHCR_STABLE" != "$TARGET" ]]; then
            echo "Promoting GHCR :stable"
            skopeo_copy_rl "${{ env.GHCR_REPO }}:${STABLE_VERSION}" "${{ env.GHCR_REPO }}:stable"
          else
            echo "GHCR :stable already up to date"
          fi

          # Sync DH stable from GHCR (avoids DH read rate limits)
          if [[ "$DH_STABLE" != "$TARGET" ]]; then
            echo "Syncing Docker Hub :stable from GHCR"
            skopeo_copy_rl "${{ env.GHCR_REPO }}:${STABLE_VERSION}" "${{ env.DOCKERHUB_REPO }}:stable" || \
              echo "::warning::Docker Hub stable sync failed — GHCR stable is correct"
          else
            echo "Docker Hub :stable already up to date"
          fi

          {
            echo "## Stable Promotion"
            echo "Version **$STABLE_VERSION** -> **:stable**"
          } >> "$GITHUB_STEP_SUMMARY"

  # ============================================================================
  # Job 7 — Cache housekeeping (mirrors optimize-cache / clean-cache)
  # ============================================================================
  cache-cleanup:
    name: Cache Housekeeping
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    needs: [check-releases, merge-manifest]
    if: needs.merge-manifest.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
        with:
          do_checkout: 'false'
          setup_qemu: 'false'
          setup_buildx: 'true'
          login_dockerhub: 'false'
          login_ghcr: 'false'

      - name: Prune stale build cache
        run: |
          docker buildx prune \
            --filter "until=168h" \
            --keep-storage "${{ needs.check-releases.outputs.gc_keep_storage }}" \
            -f
          echo "✅ Cache pruned (7-day retention / ${{ needs.check-releases.outputs.gc_keep_storage }} max)"

  # ============================================================================
  # Job 8 — Update Docker Hub description (release tags only)
  # ============================================================================
  update-description:
    name: Update Docker Hub Description
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    needs: merge-manifest
    if: needs.merge-manifest.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync README → Docker Hub
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_REPO }}
          readme-filepath: ./README.md
          short-description: "Multi-database MCP server — MySQL, PostgreSQL, SQLite, Oracle, TimescaleDB"

  # ============================================================================
  # Job 9 — Update pipeline state (orphan branch approach)
  # Records the last successfully built upstream SHAs per channel
  # (renovate / nightly / release set) for observability and tooling.
  # ============================================================================
  update-state:
    name: Update Pipeline State
    runs-on: ${{ vars.ACTION_RUNNER_VERSION || 'ubuntu-latest' }}
    needs: [check-releases, merge-manifest, sync-registries]
    if: |
      always() &&
      needs.merge-manifest.result == 'success' &&
      (needs.sync-registries.result == 'success' || needs.sync-registries.result == 'skipped')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write pipeline state
        env:
          VERSIONS_JSON: ${{ needs.check-releases.outputs.versions_json }}
          NIGHTLY_SHA:   ${{ needs.check-releases.outputs.nightly_sha }}
          PRIMARY_TAG:   ${{ needs.merge-manifest.outputs.primary_tag }}
        run: |
          set -euo pipefail
          RENOVATE_SHA="${{ env.UPSTREAM_REPO_SHA }}"
          NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Classify what was actually built this run.
          BUILT_RENOVATE=false
          BUILT_NIGHTLY=false
          BUILT_RELEASES_JSON='[]'
          if [[ -n "$VERSIONS_JSON" ]] && echo "$VERSIONS_JSON" | jq . >/dev/null 2>&1; then
            echo "$VERSIONS_JSON" | jq -e 'index("latest-from-source")' >/dev/null && BUILT_RENOVATE=true
            echo "$VERSIONS_JSON" | jq -e 'index("nightly")'            >/dev/null && BUILT_NIGHTLY=true
            BUILT_RELEASES_JSON=$(echo "$VERSIONS_JSON" \
              | jq -c '[.[] | select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$"))]')
          fi
          echo "Run summary — renovate=$BUILT_RENOVATE nightly=$BUILT_NIGHTLY releases=$BUILT_RELEASES_JSON"

          # Read previous state before switching branches.
          PREV_RENOVATE_SHA=""
          PREV_NIGHTLY_SHA=""
          PREV_RELEASES_JSON='[]'
          PREV_LATEST_SHA_SINCE=""
          if git fetch origin pipeline-state --depth=1 2>/dev/null; then
            PREV_RENOVATE_SHA=$(git show origin/pipeline-state:last-built-renovate-sha 2>/dev/null || \
                                git show origin/pipeline-state:last-built-sha          2>/dev/null || echo "")
            PREV_NIGHTLY_SHA=$(git  show origin/pipeline-state:last-built-nightly-sha  2>/dev/null || echo "")
            PREV_RELEASES_JSON=$(git show origin/pipeline-state:last-built-releases    2>/dev/null || echo "[]")
            echo "$PREV_RELEASES_JSON" | jq . >/dev/null 2>&1 || PREV_RELEASES_JSON='[]'
            PREV_LATEST_SHA_SINCE=$(git show origin/pipeline-state:latest-sha-since   2>/dev/null || echo "")
          fi

          # Advance per-channel keys only when that channel actually built.
          NEW_RENOVATE_SHA="$PREV_RENOVATE_SHA"
          NEW_NIGHTLY_SHA="$PREV_NIGHTLY_SHA"
          NEW_RELEASES_JSON="$PREV_RELEASES_JSON"
          [[ "$BUILT_RENOVATE" == "true" ]] && NEW_RENOVATE_SHA="$RENOVATE_SHA"
          [[ "$BUILT_NIGHTLY"  == "true" && -n "$NIGHTLY_SHA" ]] && NEW_NIGHTLY_SHA="$NIGHTLY_SHA"
          if [[ "$(echo "$BUILT_RELEASES_JSON" | jq 'length')" -gt 0 ]]; then
            NEW_RELEASES_JSON=$(jq -cn --argjson prev "$PREV_RELEASES_JSON" \
                                       --argjson cur  "$BUILT_RELEASES_JSON" \
                                       '($prev + $cur) | unique | sort')
          fi

          # latest_sha_since tracks Renovate-channel continuity (drives :stable promotion).
          if [[ "$NEW_RENOVATE_SHA" != "$PREV_RENOVATE_SHA" || -z "$PREV_LATEST_SHA_SINCE" ]]; then
            LATEST_SHA_SINCE="$NOW"
            echo "Renovate SHA changed (${PREV_RENOVATE_SHA:-none} -> $NEW_RENOVATE_SHA) — resetting latest_sha_since"
          else
            LATEST_SHA_SINCE="$PREV_LATEST_SHA_SINCE"
            echo "Renovate SHA unchanged — preserving latest_sha_since=$LATEST_SHA_SINCE"
          fi

          git checkout pipeline-state 2>/dev/null || git checkout --orphan pipeline-state
          git rm -rf --ignore-unmatch . > /dev/null 2>&1 || true

          # Per-channel state files.
          echo "$NEW_RENOVATE_SHA" > last-built-renovate-sha
          echo "$NEW_NIGHTLY_SHA"  > last-built-nightly-sha
          echo "$NEW_RELEASES_JSON" > last-built-releases
          echo "$NOW"              > last-built-time
          echo "$PRIMARY_TAG"      > last-built-tag
          echo "$LATEST_SHA_SINCE" > latest-sha-since
          # Back-compat alias — older readers still consult last-built-sha.
          echo "$NEW_RENOVATE_SHA" > last-built-sha

          git add last-built-renovate-sha last-built-nightly-sha last-built-releases \
                  last-built-sha last-built-time last-built-tag latest-sha-since
          if ! git diff --cached --quiet; then
            git -c user.name="github-actions[bot]" \
                -c user.email="github-actions[bot]@users.noreply.github.com" \
                commit -m "pipeline-state: renovate=$NEW_RENOVATE_SHA nightly=${NEW_NIGHTLY_SHA:-none} releases=$NEW_RELEASES_JSON"
            git push origin pipeline-state
          else
            echo "No changes to pipeline state — skipping commit"
          fi

          echo "Updated pipeline-state branch with SHA $RENOVATE_SHA, latest_sha_since=$LATEST_SHA_SINCE"
