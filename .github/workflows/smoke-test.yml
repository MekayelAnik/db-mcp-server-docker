# .github/workflows/smoke-test.yml
# =============================================================================
# Reusable post-build MCP smoke test.
#
# Boots a fresh PostgreSQL+TimescaleDB service container, pulls the
# specified image, and runs the full MCP `tools/call` battery defined in
# .github/smoke/run-smoke.sh.
#
# Modes
# ─────────────────────────────────────────────────────────────────────────────
#   workflow_call → invoked by docker-publish.yml after merge-manifest
#                   succeeds for a given version. Caller passes image_ref +
#                   version. Smoke result gates sync-registries (strict for
#                   nightly, advisory for release tags — see caller's `if`).
#
#   workflow_dispatch → manual re-smoke of an existing GHCR image without
#                       forcing a rebuild. Useful for ad-hoc validation
#                       after upstream fixes land.
# =============================================================================

name: Smoke Test (MCP)

on:
  workflow_call:
    inputs:
      image_ref:
        description: 'Full image ref to smoke (e.g. ghcr.io/owner/db-mcp-server:nightly)'
        required: true
        type: string
      version:
        description: 'Version label for summary (informational)'
        required: false
        type: string
        default: ''
      runner_version:
        description: 'GitHub Actions runner image (default: ubuntu-latest)'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      ghcr_token:
        description: 'GHCR read token (GITHUB_TOKEN with packages:read or GHCR_TOKEN)'
        required: true

  workflow_dispatch:
    inputs:
      image_ref:
        description: 'Full image ref to smoke'
        required: true
        type: string
        default: 'ghcr.io/mekayelanik/db-mcp-server:nightly'
      version:
        description: 'Version label for summary'
        required: false
        type: string
        default: 'manual'

jobs:
  smoke:
    name: Smoke Test ${{ inputs.version || inputs.image_ref }}
    runs-on: ${{ inputs.runner_version || 'ubuntu-latest' }}

    permissions:
      contents: read
      packages: read

    services:
      postgres:
        image: timescale/timescaledb-ha:pg18
        env:
          POSTGRES_USER:     dbmcp
          POSTGRES_PASSWORD: smokepass
          POSTGRES_DB:       smoke_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dbmcp -d smoke_db"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Cache apt packages across runs (~15-25s saved per smoke job)
      - name: Install client tools (apt-cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: postgresql-client jq curl
          version: 1.0

      - name: Login to GHCR (read-only)
        uses: ./.github/actions/registry-login
        with:
          ghcr_actor:        ${{ github.actor }}
          ghcr_token:        ${{ secrets.ghcr_token != '' && secrets.ghcr_token || secrets.GITHUB_TOKEN }}
          push_to_dockerhub: 'false'
          push_to_ghcr:      'true'

      # Begin pulling the image in the background while postgres service
      # finishes warming up. The smoke script also calls `docker pull`, but
      # that becomes a no-op once the image is cached locally. Saves ~30-50s
      # of wall-clock time vs. doing the pull serially after postgres ready.
      - name: Pre-pull dbmcp image (background)
        env:
          IMAGE_REF: ${{ inputs.image_ref }}
        run: |
          # nohup + setsid + double-fork to detach from the step shell so
          # the pull keeps running while subsequent steps continue. PID is
          # recorded on disk for later wait-step polling.
          nohup setsid bash -c '
            docker pull "'"$IMAGE_REF"'" > /tmp/prepull.log 2>&1
            echo "EXIT=$?" >> /tmp/prepull.log
          ' </dev/null >/dev/null 2>&1 &
          echo $! > /tmp/prepull.pid
          disown
          echo "Pre-pull PID: $(cat /tmp/prepull.pid) (image: ${IMAGE_REF})"

      - name: Wait for image pre-pull
        run: |
          # `wait` is shell-builtin and only works for children of the
          # current shell. Across step boundaries we poll the recorded PID
          # via `kill -0` instead. `tail --pid=PID -f /dev/null` blocks
          # cleanly until the target exits.
          PID=$(cat /tmp/prepull.pid 2>/dev/null || echo "")
          if [[ -n "$PID" ]] && kill -0 "$PID" 2>/dev/null; then
            tail --pid="$PID" -f /dev/null &
            wait $!
            echo "Pre-pull complete (PID $PID exited)"
          else
            echo "Pre-pull already finished"
          fi

      - name: Run MCP smoke battery
        env:
          IMAGE_REF: ${{ inputs.image_ref }}
          PG_HOST:   localhost
          PG_PORT:   '5432'
          PG_USER:   dbmcp
          PG_PASS:   smokepass
          PG_DB:     smoke_db
          MCP_PORT:  '39092'
        run: |
          chmod +x .github/smoke/run-smoke.sh
          bash .github/smoke/run-smoke.sh "$IMAGE_REF"

      - name: Container logs on failure
        if: failure()
        run: |
          {
            echo "## ❌ Smoke failed: ${{ inputs.version || inputs.image_ref }}"
            echo
            echo "Image: \`${{ inputs.image_ref }}\`"
            echo
            echo "### Container logs (tail 200)"
            echo '```'
            docker logs dbmcp-smoke 2>&1 | tail -200 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summary on success
        if: success()
        run: |
          {
            echo "## ✅ Smoke passed: ${{ inputs.version || inputs.image_ref }}"
            echo
            echo "Image: \`${{ inputs.image_ref }}\`"
            echo "Postgres: \`timescale/timescaledb-ha:pg18\`"
          } >> "$GITHUB_STEP_SUMMARY"
